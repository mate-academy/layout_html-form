<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,
          user-scalable=no,
          initial-scale=1.0,
          maximum-scale=1.0,
          minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <form action="https://mate-academy-form-lesson.herokuapp.com/create-application" method="POST">
    <fieldset class="block-of-input">
      <legend>Personal information</legend>
      <div class="field">
        <label for="surname">Surname:</label>
        <input type="text" id="surname" name="surname" autocomplete="off" minlength="2" required>
      </div>

      <div class="field">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" autocomplete="off" minlength="2" required>
      </div>

      <div class="field">
        <label for="age">How old are You?</label>
        <input type="number" value="12" data-qa="field-value" id="age" name="age" min="18" max="100">
      </div>

      <div class="field">
        <label for="dob">Full date of birth:</label>
        <input type="date" id="dob" name="dob" max="2001-07-24">
      </div>

      <div class="field">
        <label for="accept">I accept the term of the agreement</label>
        <input type="checkbox" id="accept" name="accept" required>
      </div>
    </fieldset>

    <fieldset class="block-of-input">
      <legend>Registration</legend>
      <div class="field">
        <label for="email">E-mail:</label>
        <input type="email" data-qa="field-placeholder" id="email" name="email" placeholder="email@example.com"
          required>
      </div>

      <div class="field">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password"
          pattern="^(?=.*[A-Z].*[A-Z])(?=.*[!@#$*])(?=.*[0-9].*[0-9])(?=.*[a-z].*[a-z].*[a-z]).{8}$"
          title="Your password must include 2 letters upper case, 3 letters lower case, 2 numerals, 1 of the following special character: !@#$*">
      </div>
    </fieldset>

    <fieldset class="block-of-input">
      <legend>An interesting fact about you!</legend>
      <div class="field">
        Do you love cats?
        <input type="radio" id="yes" name="love-cats" value="yes">
        <label for="yes">Yes</label>
        <input type="radio" id="no" name="love-cats" value="no">
        <label for="no">No</label>
      </div>

      <div class="field">
        <label for="color">What is your favorite color?</label>
        <input type="color" id="color" name="color">
      </div>

      <div class="field">
        <label for="bed-time">What time do you go to bed?</label>
        <input type="time" id="bed-time" name="bed-time" step="2">
      </div>

      <div class="field">
        <label for="fav-car">What are your favorite brand of cars?</label>
        <select id="fav-car" name="fav-car" size="4">
          <option value="bmw">BWM</option>
          <option value="audi">Audi</option>
          <option value="lada">lada</option>
        </select>
      </div>

      <div class="field">
        <label for="feedback-rate">How do you rate our work?</label>
        <input type="range" id="feedback-rate" name="feedback-rate" min="10" max="1">
      </div>

    </fieldset>

    <fieldset class="block-of-input">
      <legend>Additional info:</legend>
      <div class="field">
        <label for="comments">Comments:</label>
        <textarea rows="2" id="comments" name="comments" autocomplete="off" placeholder="Your comments">
        </textarea>
      </div>

      <div class="field">
        <label for="recommend-us">Would you recommend us?</label>
        <select id="recommend-us" class="recommend-us" name="recommend-us">
          <option value="yes">yes</option>
          <option value="no">no</option>
        </select>
      </div>

    </fieldset>

    <button type="submit" class="submit-button" onsubmit="onSubmit(event)">Submit</button>

  </form>
  <script type="text/javascript" src="./main.js"></script>
</body>

</html>
