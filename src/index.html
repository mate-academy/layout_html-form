<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width,
          user-scalable=no,
          initial-scale=1.0,
          maximum-scale=1.0,
          minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
<form action="https://mate-academy-form-lesson.herokuapp.com/create-application" onsubmit="onSubmit(event)" method="post">
  <fieldset>
    <legend>Personal information</legend>
    <label>
      Surname:
      <input type="text" name="surname" required autocomplete="off">
    </label>
    <label>
      Name:
      <input type="text" name="name" required autocomplete="off">
    </label>
    <label>
      How old are You?
      <input type="number" value="12" name="age" min="12" max="110" data-qa="field-value">
    </label>
    <label>
      Full date of birth:
      <input type="date" name="dob">
    </label>
    <label>
      I accept the term of the agreement
      <input type="checkbox" name="agreement" required> <br>
    </label>
  </fieldset>
  <fieldset>
    <legend>Registration</legend>
    <label>
      E-mail:
      <input type="email" name="email" placeholder="email@example.com" data-qa="field-placeholder">
    </label>
    <label>
      Password:
      <input type="password" name="password" minlength="4" maxlength="12">
    </label>
  </fieldset>
  <fieldset>
    <legend>An interesting fact about you!</legend>
    <label>
      Do you love cats?
      <input type="radio" name="cats" value="Yes"> Yes
      <input type="radio" name="cats" value="No"> No
    </label>
    <label>
      What is your favorite color?
      <input type="color">
    </label>
    <label>
      What time do you go to bed?
      <input type="time" name="bed_time" step="2">
    </label>
    <div class="cars">
      What are your favorite brand of cars?
      <select name="Cars" multiple>
        <option value="BMW">BMW</option>
        <option value="Audi">Audi</option>
        <option value="Lada">Lada</option>
      </select>
    </div>
    <label>
      How do you rate our work?
      <input type="range" step="1" name="rate" value="1" min="1" max="5">
    </label>
  </fieldset>
  <fieldset>
    <legend>Additional info</legend>
    <label>
      Comments:
      <textarea autocomplete="off" ></textarea>
    </label>
    <div class="recommend">
      Would you recommend us?
      <select name="Recommend">
        <option value="Yes">yes</option>
        <option  value="No">no</option>
      </select>
    </div>
  </fieldset>
  <button type="submit">Submit</button>
</form>
<script type="text/javascript" src="./main.js"></script>
</body>
</html>
