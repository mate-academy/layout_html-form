<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>HTML Form</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
<form action="https://mate-academy-form-lesson.herokuapp.com/create-application" method="POST">
  <fieldset class="block">
    <legend>Personal information</legend>
    <div class="input-field">
      <label for="surname">Surname:</label>
      <input type="text" name="surname" id="surname" minlength="2" autocomplete="off">
    </div>
    <div class="input-field">
      <label for="name">Name:</label>
      <input type="text" name="name" id="name" minlength="2" autocomplete="off">
    </div>
    <div class="input-field">
      <label for="age">How old are You?</label>
      <input type="number" name="age" id="age" value="12" max="120" min="6" autocomplete="off">
    </div>
    <div class="input-field">
      <label for="birthday">Full date of birth:</label>
      <input type="date" name="birthday" id="birthday">
    </div>
    <div class="input-field-last">
      <label for="agreement">I accept the term of the agreement</label>
      <input type="checkbox" name="agreement" id="agreement" >
    </div>
  </fieldset>
  <fieldset class="block">
    <legend>Registration</legend>
    <div class="input-field">
      <label for="mail">E-mail:</label>
      <input type="email" name="mail" id="mail" placeholder="email@example.com" required maxlength="30" autocomplete="off">
    </div>
    <div class="input-field-last">
      <label for="pass">Password:</label>
      <input type="password" name="pass" id="pass" required autocomplete="off">
    </div>
  </fieldset>
  <fieldset class="block">
    <legend>An interesting fact about you!</legend>
    <div class="input-field">
      Do you love cats?
      <input type="radio" name="cats" id="yes">
      <label for="yes">Yes</label>
      <input type="radio" name="cats" id="no">
      <label for="no">No</label>
    </div>
    <div class="input-field">
      <label for="color">What is your favorite color?</label>
      <input type="color" name="color" id="color">
    </div>
    <div class="input-field">
      <label for="bedtime">What time do you go to bed?</label>
      <input type="time" step="1" name="bedtime" id="bedtime">
    </div>
    <div class="input-field">
      What are your favorite brand of cars?
      <select name="cars" id="cars" multiple>
        <option value="bmw">BMW</option>
        <option value="audi">Audi</option>
        <option value="lada">Lada</option>
      </select>
    </div>
      <label>
        How do you rate our work?
        <input type="range" name="work" id="work">
      </label>
  </fieldset>
  <fieldset class="block">
    <legend>Additional info:</legend>
    <div class="input-field">
      <label for="comments">Comments:</label>
      <textarea name="comments" id="comments"></textarea>
    </div>
    <div class="input-field-last">
      <label for="recommend">Would you recommend us?</label>
      <select name="recommend" id="recommend">
        <option value="yes" selected>Yes</option>
        <option value="no">No</option>
      </select>
    </div>
  </fieldset>
  <button type="submit">Submit</button>
</form>
  <script type="text/javascript" src="./main.js"></script>
</body>
</html>
