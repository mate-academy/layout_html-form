<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width,
          user-scalable=no,
          initial-scale=1.0,
          maximum-scale=1.0,
          minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <form action="">
    <fieldset>
      <legend>Personal information</legend>
      <div>
        <label for="surname">Surname:</label>
        <input type="text" name="surname" id="surname" autocomplete="off">
      </div>
      <div>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" autocomplete="off">
      </div>
      <div>
        <label for="age">How old are You?</label>
        <input type="number" id="age" name="age" value="12" data-qa="field-value" min="1" max="110">
      </div>
      <div>
        <label for="date">Full date of birth:</label>
        <input type="date" id="date" name="date">
      </div>
      <div>
        <label for="check">I accept the term of the agreement</label>
        <input type="checkbox" id="check">
      </div>
    </fieldset>
    <fieldset>
      <legend>Registration</legend>
      <div>
        <label for="mail">E-mail:</label>
        <input type="email" id="mail" name="email" placeholder="email@example.com" data-qa="field-placeholder">
      </div>
      <div>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password">
      </div>
    </fieldset>
    <fieldset>
      <legend>An interesting fact about you!</legend>
      <div>
        Do you love cats?
        <input type="radio" name="prefer" value="yes">Yes
        <input type="radio" name="prefer" value="no">No
      </div>
      <div>
        <label>
          What is your favorite color?
          <input type="color">
        </label>
      </div>
      <div>
        <label>
          What time do you go to bed?
          <input type="time" name="bed-time">
        </label>
      </div>
      <div>
        <label>
          What are your favorite brand of cars?
          <select name="cars" size="4">
            <option value="bmw">BMW</option>
            <option value="audi">Audi</option>
            <option value="lada">Lada</option>
          </select>
        </label>
      </div>
      <div>
        <label>
          How do you rate our work?
          <input type="range" name="rate" min="0" max="100" value="0">
        </label>
      </div>
    </fieldset>
    <fieldset>
      <legend>Additional info:</legend>
      <div>
        <label for="comment">Comments:</label>
        <textarea name="comment" id="comment" minlength="1" maxlength="100" autocomplete="off"></textarea>
      </div>
      <div>
        <label for="recommend">Would you recommend us?</label>
        <select name="recommend" id="recommend">
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>
      </div>
    </fieldset>
    <button type="submit">Submit</button>
  </form>
<script type="text/javascript" src="./main.js"></script>
</body>
</html>
