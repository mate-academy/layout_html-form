<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width,
          user-scalable=no,
          initial-scale=1.0,
          maximum-scale=1.0,
          minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <form action="https://mate-academy-form-lesson.herokuapp.com/create-application" onsubmit="onSubmit(event)">

    <div class="personal_info group-field">
      <fieldset>
        <legend>Personal information</legend>
        <div class="surname-block field">
          <label for="surname">Surname:</label>
          <input id="surname" type="text" name="surname" required>
        </div>
        <div class="name-block field">
          <label for="name">Name:</label>
          <input id="name" type="text" name="name" autocomplete="off" required>
        </div>
        <div class="age-block field">
          <label for="age">How old are You?</label>
          <input id="age" class="age" type="number" data-qa="field-value" name="age" maxlength="50px" value="12">
        </div>
        <div class="b_date-block field">
          <label for="b_date">Full date of birth:</label>
          <input id="b_date" type="date" name="b-date">
        </div>
        <div class="agree-block field">
          <label for="agree">I accept the term of the agreement</label>
          <input id="agree" type="checkbox" name="agree" required>
        </div>
      </fieldset>
    </div>

    <div class="registration group-field">
        <fieldset>
          <legend>Registration</legend>
          <div class="mail-block field">
            <label for="e-mail">E-mail:</label>
            <input  id="e-mail" type="email" data-qa="field-placeholder" name="email"
            placeholder="email@example.com" required>
          </div>
          <div class="password-block field">
            <label for="password">Password:</label>
            <input id="password" type="password" name="password" minlength="8" required>
          </div>
        </fieldset>
      </div>

      <div class="interest_info group-field">
        <fieldset>
          <legend>An interesting fact about you!</legend>
          <div class="animal_interest-block field">
            Do you love cats?
            <label>
              <input type="radio" name="cat" value="yes">
                Yes
            </label>
            <label>
              <input type="radio" name="cat" value="no">
                No
            </label>
          </div>
          <div class="favorite_color_block field">
            <label for="color">What is your favorite color?</label>
            <input id="color" type="color" name="color">
          </div>
          <div class="bed_time-block field">
            <label for="bed_time">What time do you go to bed?</label>
            <input id="bed_time" type="time" name="bed-time">
          </div>
          <div class="favorite_car_brand-block field">
            <label for="car_brand">What are your favorite brand of cars?</label>
            <select id="car_brand" name="car_brand" multiple>
              <option value="1">BMW</option>
              <option value="2">Audi</option>
              <option value="3">Lada</option>
              </select>
          </div>
          <div class="rating-block field">
              <label for="rating">How do you rate our work?</label>
              <input id="rating" type="range" name="rating" value="0" min="0" max="10" step="1">
          </div>
        </fieldset>
      </div>

      <div class="aditional_info group-field">
        <fieldset>
          <legend>Additional info</legend>
          <div class="comments-block field">
            <label for="comments">Comments:</label>
            <textarea id="comments" name="comments" maxlength="150"></textarea>
          </div>
          <div class="recommend-block field">
            <label for="recommend">Would you recommend us?</label>
            <select id="recommend" name="recommend">
              <option value="1">yes</option>
              <option value="2">no</option>
            </select>
          </div>
        </fieldset>
      </div>

      <div class="feedback_button field">
          <button type="submit">Submit</button>
      </div>

  </form>

<script type="text/javascript" src="./main.js"></script>
</body>
</html>
