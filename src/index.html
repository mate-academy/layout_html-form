<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>HTML Form</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <form action="" method="post">
      <!-- Personal Information -->
      <fieldset class="form-sections">
        <legend>Personal information</legend>
        <label class="inputs">
          Surname:
          <input type="text" name="surname" autocomplete="off">
        </label>
        <label class="inputs">
          Name:
          <input type="text" name="name" autocomplete="off">
        </label>
        <label class="inputs">
          How old are You?
          <input type="number" class="age-input" name="age" value="12" min="12" max="90">
        </label>
        <label class="inputs">
          Full date of birth:
          <input type="date" name="date-of-birth">
        </label>
        <label>
          I accept the term of the agreement
          <input type="checkbox" name="terms">
        </label>
      </fieldset>
      <!-- Registration -->
      <fieldset class="form-sections">
        <legend>Registration</legend>
        <label class="inputs">
          E-mail:
          <input type="email" name="email" placeholder="email@example.com" required>
        </label>
        <label>
          Password:
          <input type="password" name="password" minlength="8" maxlength="16">
        </label>
      </fieldset>
      <!-- Fact -->
      <fieldset class="form-sections">
        <legend>An interesting fact about you!</legend>
        <label class="inputs">
          Do you love cats?
          <input type="radio" name="cats"> Yes
          <input type="radio" name="cats"> No
        </label>
        <label class="inputs">
          What is your favorite color?
          <input type="color" name="color">
        </label>
        <label class="inputs">
          What time do you go to bed?
          <input type="time" name="time" step="any">
        </label>
        <label class="inputs">
          What are your favorite brand of cars?
            <select name="cars" multiple>
            <option value="BMW">BMW</option>
            <option value="Audi">Audi</option>
            <option value="Lada">Lada</option>
          </select>
        </label>
        <label>
          How do you rate our work?
          <input type="range" name="rate" value="0">
        </label>
      </fieldset>
      <!-- Additional Info -->
      <fieldset class="form-sections">
        <legend>Additional info:</legend>
        <label class="inputs">
          Comments:
          <textarea name="comments"></textarea>
        </label>
        <label>
          Would you recommend us?
          <select name="recommend">
            <option value="yes">yes</option>
            <option value="no">no</option>
          </select>
        </label>
      </fieldset>
      <input type="submit" name="submit" onsubmit="onSubmit()">
    </form>
    <script type="text/javascript" src="./main.js"></script>
  </body>
</html>
