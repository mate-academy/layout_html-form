<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    >
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>HTML Form</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <form
    action="https://mate-academy-form-lesson.herokuapp.com/create-application"
    onsubmit="onSubmit()"
    >
      <fieldset class="container">
        <legend>Personal information</legend>
        <div class="personal-info">
          <label for="1">Surname</label>:
          <input
            type="text"
            name="personal-fields"
            autocomplete="disabled"
            id="1"
          >
        </div>
        <div class="personal-info">
          <label for="2">Name:</label>
          <input
            type="text"
            name="personal-fields"
            autocomplete="disabled"
            id="2"
          >
        </div>
        <div class="personal-info">
          <label for="3">How old are You?</label>
          <input
            type="number"
            value="12"
            name="personal-fields"
            min="3"
            max="100"
            id="3"
          >
        </div>
        <div class="personal-info">
          <label for="4">Full date of birth:</label>
          <input
            type="date"
            name="personal-fields"
            id="4"
          >
        </div>
        <div class="personal-info">
          <label for="5">I accept the term of the agreement</label>
          <input
            type="checkbox"
            name="personal-fields"
            id="5">
        </div>
      </fieldset>
      <fieldset class="container">
        <legend>Registration</legend>
        <div class="personal-info">
          <label for="6">E-mail:</label>
          <input
            type="email"
            placeholder="email@example.com"
            name="credentials"
            required
            id="6"
          >
        </div>
        <div class="personal-info">
          <label for="7">Password:</label>
          <input
            type="password"
            name="credentials"
            minlength="5"
            maxlength="30"
            id="7"
          >
        </div>
      </fieldset>
      <fieldset class="container">
        <legend>An interesting fact about you!</legend>
        <div class="personal-info">
          Do you love cats?
          <label for="yes">
            <input
              type="radio"
              name="cat"
              id="yes"
            > Yes
          </label>
          <label for="no">
            <input
              type="radio"
              name="cat"
              id="no"
            > No
          </label>
        </div>
        <div class="personal-info">
          <label for="9">What is your favorite color?</label>
          <input
            type="color"
            name="add-information"
            id="9"
          >
        </div>
        <div class="personal-info">
          <label for="10">What time do you go to bad?</label>
          <input
            type="time"
            name="add-information"
            step="1"
            id="10"
          >
        </div>
        <div class="personal-info">
          <label for="11">What are your favorite brands of car?</label>
          <select
            name="car"
            multiple
            id="11"
          >
            <option value="BMW">BMW</option>
            <option value="Audi">Audi</option>
            <option value="Lada">Lada</option>
          </select>
        </div>
        <div class="personal-info">
          <label for="13">How do you rate your work?</label>
          <input
            type="range"
            name="add-information"
            id="13"
          >
        </div>
      </fieldset>
      <fieldset class="container">
        <legend>Additional info</legend>
        <div class="personal-info">
          <label for="14">Comments:</label>
          <textarea name="comments" id="14"></textarea>
        </div>
        <div class="personal-info">
          <label for="15">Would you recommend us?</label>
          <select name="recommend" id="15">
            <option value="yes" selected>yes</option>
            <option value="no">no</option>
          </select>
        </div>
      </fieldset>
      <button type="submit">Submit</button>
    </form>
    <script type="text/javascript" src="./main.js"></script>
  </body>
</html>
