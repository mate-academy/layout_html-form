<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width,
          user-scalable=no,
          initial-scale=1.0,
          maximum-scale=1.0,
          minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <form action="#" onsubmit="https://mate-academy-form-lesson.herokuapp.com/create-application">
    <fieldset>
      <legend>Personal information</legend>
      <div class="field">
        <label>
          Surname:
          <input type="text" autocomplete="off" name="Surname">
        </label>
      </div>
      <div class="field">
        <label>
          Name:
          <input type="text" autocomplete="off" name="name">
        </label>
      </div>
      <div class="field">
        <label>
          How old are You?
          <input
            type="number"
            name="age"
            value="12"
            data-qa="field-value"
          >
        </label>
      </div>
      <div class="field">
        <label>
          Full date of birth:
          <input type="date" name="birth-date">
        </label>
      </div>
      <div class="field">
        <label>
          I accept the term of the agreement
          <input type="checkbox" name="agreement">
        </label>
      </div>
    </fieldset>

    <fieldset>
      <legend>Registration</legend>
      <div class="field">
        <label required>
          E-mail:
          <input
            type="email"
            name="email"
            placeholder="email@example.com"
            data-qa="field-placeholder"
          >
        </label>
      </div>
      <div class="field">
        <label required>
          Password:
          <input type="password" name="passw">
        </label>
      </div>
    </fieldset>

    <fieldset>
      <legend>An interesting fact about you!</legend>
      <div class="field">
        <label>
          Do you love cats?
          <input
            type="radio"
            name="like-cats"
            value="yes"
          >
          Yes
        </label>
        <label>
          <input
            type="radio"
            name="like-cats"
            value="no"
          >
          No
        </label>
      </div>
      <div class="field">
        <label>
          What is your favorite color?
          <input
            type="color"
            name="fav-color"
            value="black"
          >
        </label>
      </div>
      <div class="field">
        <label>
          What time do you go to bed?
          <input
            type="time"
            name="bed-time"
            step="1"
          >
        </label>
      </div>
      <div class="field">
        <label>
          What are your favorite brand of cars?
          <select
            name="fav-cars"
            size="4"
            multiple
          >
            <option value="BMW">BMW</option>
            <option value="Audi">Audi</option>
            <option value="Lada">Lada</option>
          </select>
        </label>
      </div>
      <div class="field">
        <label>
          How do you rate our work?
          <input
            type="range"
            name="work-rate"
            min="1"
            max="10"
            value="1"
          >
        </label>
      </div>
    </fieldset>

    <fieldset>
      <legend>Additional info:</legend>
      <div class="field">
        <label>
          Comments:
          <textarea name="comments-block"></textarea>
        </label>
      </div>
      <div class="field">
        <label>
          Would you recommend us?
          <select name="recommend-us">
            <option value="yes">yes</option>
            <option value="no">no</option>
          </select>
        </label>
      </div>
    </fieldset>
    <input type="submit" value="Submit">
  </form>
<script type="text/javascript" src="./main.js"></script>
</body>
</html>
