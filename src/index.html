<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>HTML Form</title>
    <link rel="stylesheet" href="./style.css">
  </head>

  <body>
    <form action="https://mate-academy-form-lesson.herokuapp.com/create-application">
      <fieldset>
        <legend>Personal information</legend>
        <label for="surname">Surname:
          <input name="surname" id="surname"
          type="text" autocomplete="off"
          required>
        </label>
        <br>
        <label for="name">Name:
          <input name="name" id="name"
          type="text" autocomplete="off">
        </label>
        <br>
        <label for="age">How old are You?
          <input name="age" id="age"
          type="number" min="1"
          max="99" minlength="1"
          value="12">
        </label>
        <br>
        <label for="date">Full date of birth:
          <input name="date" id="date"
          type="date">
        </label>
        <br>
        <label for="check">I accept the term of the agreement
          <input name="check" id="check"
          type="checkbox">
        </label>
      </fieldset>
      <fieldset>
        <legend>Registration</legend>
        <label for="email">E-mail:
          <input name="email" id="email"
          type="email" placeholder="email@example.com"
          autocomplete="off">
        </label>
        <br>
        <label for="password">Password:
          <input name="password" id="password"
          type="password" autocomplete="off">
        </label>
      </fieldset>
      <fieldset>
        <legend>An interesting fact about you!</legend>
        <label for="radio">Do you love cats?
          <input type="radio" name="radio"
          id="radio"> Yes
          <input type="radio" name="radio"> No
        </label>
        <br>
        <label for="color">What is your favorite color?
          <input type="color" name="color"
          id="color">
        </label>
        <br>
        <label for="time">What time do you go to bed?
          <input type="time" name="time"
          id="time">
        </label>
        <br>
        <label for="car">What are your favorite brand of cars?
          <select name="car" id="car"
          multiple>
            <option>BMW</option>
            <option>Audi</option>
            <option>Lada</option>
          </select>
        </label>
        <br>
        <label for="range">How do you rate our work?
          <input type="range" name="range"
          id="range" value="0">
        </label>
      </fieldset>
      <fieldset>
        <legend>Additional info:</legend>
        <label for="text">Comments:
          <textarea name="text" id="text"
          autocomplete="off" maxlength="1000">
          </textarea>
        </label>
        <br>
        <label for="reco">Would you recommend us?
          <select name="reco" id="reco">
            <option>yes</option>
            <option>no</option>
          </select>
        </label>
      </fieldset>
      <button name="button" type="submit"
      onsubmit="onSubmit()">Submit
      </button>
    </form>
  </body>

</html>
