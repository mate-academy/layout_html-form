<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>HTML Form</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
<form>
  <fieldset>
    <legend>Personal information</legend>
    <label for="surname">Surname: <input type="text" name="name" id="surname"> </label><br>
    <label for="firstName">Name: <input type="text" name="name" id="firstName"></label> <br>
    <label for="age">How old are You? <input type="number" min="5" max="100" value="12" name="date" id="age"> </label> <br>
    <label for="dateOfBirth">Full date of birth: <input type="date" name="date" id="dateOfBirth"></label> <br>
    <label for="accept">I accept the term of the agreement <input type="checkbox" name="acceptCheck" id="accept"></label>
  </fieldset>

  <fieldset>
    <legend>Registration</legend>
    <label for="email">E-mail: <input type="email" name="name" id="email" placeholder="email@example.com"> </label><br>
    <label for="password">Password: <input type="password" name="name" id="password" minlength="8"> </label> <br>
  </fieldset>

  <fieldset>
    <legend>An interesting fact about you!</legend>
    <p>Do you love cats? <input type="radio" name="question"> Yes <input type="radio" name="question" > No </p>
    <label for="checkColor">What is your favorite color? <input type="color" name="question" id="checkColor" value="#000"> </label> <br>
    <label for="timeToBed">What time do you go to bed?  <input type="time" step="1" name="time" id="timeToBed"></label> <br>
    <label for="cars">What are your favorite brand of cars? <select name="select" id="cars" multiple size="4">
      <option value="bmw">BMW</option>
      <option value="audi">Audi</option>
      <option value="lada">Lada</option>
  </select> </label> <br>
    <label for="rate">How do you rate our work? <input type="range" value="0" name="" id="rate" min="0" max="100"> </label> <br>
  </fieldset>

  <fieldset>
    <legend>Additional info: </legend>
    <label for="comments">Comments: <textarea id="comments" name="area"> </textarea> </label> <br>
    <label for="recommend">Would you recommend us?  <select name="recommendUs" id="recommend">
      <option value="yes">yes</option>
      <option value="no">no</option>
  </select> </label>
  </fieldset>
  <input type="submit" onsubmit="onSubmit()">
</form>
  <script type="text/javascript" src="./main.js"></script>
</body>
</html>
