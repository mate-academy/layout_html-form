<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    >
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>HTML Form</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <form
      action="https://mate-academy-form-lesson.herokuapp.com/create-application"
      target="_blank"
    >
      <fieldset class="form-field">
        <legend>Personal information</legend>
        <div class="form-field__element">
          <label for="surname">Surname:</label>
          <input
            type="text"
            id="surname"
            name="surname"
            autocomplete="off"
          >
        </div>
        <div class="form-field__element">
          <label for="name">Name:</label>
          <input
            type="text"
            id="name"
            name="name"
            autocomplete="off"
          >
        </div>
        <div class="form-field__element">
          <label for="age">How old are You?</label>
          <input
            type="number"
            id="age"
            name="age"
            value="12"
            min="12"
            max="100"
            autocomplete="off"
          >
        </div>
        <div class="form-field__element">
          <label for="date">
            Full date of birth:
          </label>
          <input
            type="date"
            id="date"
            name="date"
          >
        </div>
        <div class="form-field__element">
          <label for="agreement">
            I accept the term of the agreement
          </label>
          <input
            type="checkbox"
            id="agreement"
            name="agreement"
          >
        </div>
      </fieldset>
      <fieldset class="form-field">
        <legend>Registration</legend>
        <div class="form-field__element">
          <label for="email">E-mail:</label>
          <input
            type="email"
            id="email"
            placeholder="email@example.com"
            autocomplete="off"
          >
        </div>
        <div class="form-field__element">
          <label for="password">Password:</label>
          <input
            type="password"
            id="password"
            name="password"
            minlength="8"
            autocomplete="off"
            required
          >
        </div>
      </fieldset>
      <fieldset class="form-field">
        <legend>
          An interesting fact about you!
        </legend>
        <div class="form-field__element">
          <span>Do you love cats?</span>
          <input
            type="radio"
            id="love-cats-yes"
            name="love-cats"
            value="yes"
          >
          <label for="love-cats-yes">Yes</label>
          <input
            type="radio"
            id="love-cats-no"
            name="love-cats"
            value="no"
          >
          <label for="love-cats-no">No</label>
        </div>
        <div class="form-field__element">
          <label for="color">
            What is your favorite color?
          </label>
          <input
            type="color"
            id="color"
            name="color"
          >
        </div>
        <div class="form-field__element">
          <label for="time">
            What time do you go to bed?
          </label>
          <input
            type="time"
            id="time"
            name="time"
          >
        </div>
        <div class="form-field__element">
          <label for="cars">
            What are your favorite brand of cars?
            <select
              name="cars"
              id="cars"
              size="4"
              multiple
            >
              <option value="bmw">BMW</option>
              <option value="audi">Audi</option>
              <option value="lada">Lada</option>
            </select>
          </label>
        </div>
        <div class="form-field__element">
          <label for="work-rate">
            How do you rate our work?
          </label>
          <input
            type="range"
            id="work-rate"
            name="work-rate"
            min="1"
            max="10"
            value="1"
          >
        </div>
      </fieldset>
      <fieldset class="form-field">
        <legend>Additional info:</legend>
        <div class="form-field__element">
          <label for="comments">
            Comments:
            <textarea
              name="comments"
              id="comments"
              cols="20"
              rows="2"
              maxlength="500"
            >
            </textarea>
          </label>
        </div>
        <div class="form-field__element">
          <label for="recommend">
            Would you recommend us?
          </label>
          <select
            name="recommend"
            id="recommend"
          >
            <option value="yes">Yes</option>
            <option value="no">No</option>
          </select>
        </div>
      </fieldset>
      <button
        type="submit"
        onsubmit="onSubmit()"
      >
        Submit
      </button>
    </form>
    <script type="text/javascript" src="./main.js"></script>
  </body>
</html>
