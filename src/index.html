<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>HTML Form</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <form class="form" action="https://mate-academy-form-lesson.herokuapp.com/create-application" method="POST">
    <fieldset>
      <legend>Personal information</legend>
        <label class="form-item">Surname:
        <input name="surname"  type="text"></label>
        <label  class="form-item">Name:
        <input name="name" type="text"></label>
        <label  class="form-item">How old are You?
        <input name="age"  type="number" value="12" min="0" max="120"></label>
        <label  class="form-item">Full date of birth:
        <input name="birth"  type="date"></label>
        <label  class="form-item">I accept the term of the agreement
        <input name="agree"  type="checkbox"></label>
    </fieldset>
    <fieldset>
      <legend>Registration</legend>
        <label class="form-item">E-mail:
        <input placeholder="email@example.com" name="email"  type="email"></label>
        <label class="form-item">Password:
        <input name="password" type="password" required></label>
    </fieldset>
    <fieldset>
      <legend>An interesting fact about you!</legend>
      <label class="form-item">
        Do you love cats?
        <input  type="radio" id="yes" name="cat"><label for="yes">Yes</label>
        <input type="radio" id="no" name="cat"><label for="no">No</label>
      </label>
      <div class="form-item">
        <label for="color">What is your favorite color? </label><input id="color" type="color" name="color">
      </div>
      <label class="form-item">What time do you go to bed? <input type="time" name="sleep"  step="1"></label>
      <label  class="form-item">
        What are your favorite brand of cars?
        <select name="car" id="car" multiple>
          <option value="bmv">BMW</option>
          <option value="audi">Audi</option>
          <option value="lada">Lada</option>
          <option value=""></option>
        </select>
      </label>
      <label  class="form-item" for="work">How do you rate our work? <input id="work" min="1" max="100" step="1" value="1" type="range"></label>
    </fieldset>
    <fieldset>
      <legend>Additional info:</legend>
      <label  class="form-item">Comments: <textarea name="comments"></textarea></label>
      <label class="form-item">Would you recommend us?
        <select name="recommend">
          <option value="yes" selected>Yes</option>
          <option value="no">No</option>
        </select>
      </label>
    </fieldset>
    <button class="form-submit" type="submit" onsubmit="onSubmit()">Submit</button>
  </form>
  <script type="text/javascript" src="./main.js"></script>
</body>
</html>
