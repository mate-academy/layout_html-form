<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width,
          user-scalable=no,
          initial-scale=1.0,
          maximum-scale=1.0,
          minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
<form action="https://mate-academy-form-lesson.herokuapp.com/create-application" onsubmit="onSubmit(event)">
  <fieldset class="fieldset-block">
    <legend>Personal information</legend>
    <label>
      Surname: <br>
      <input type="text" name="surname" required autocomplete="off">
    </label>
    <br><br>
    <label>
      Name: <br>
      <input type="text" name="name" required autocomplete="off">
    </label>
    <br><br>
    <label>
      How old are you? <br>
      <input type="number" name="age" min="12" max="99" data-qa="field-value">
    </label>
    <br><br>
    <label>
      Full date of birth: <br>
      <input type="date" name="dob">
    </label>
    <br><br>
    <label>
      I accept the term of the agreement
      <input type="checkbox" name="agreement" required> <br>
    </label>
  </fieldset>
  <fieldset class="fieldset-block">
    <legend>Registration</legend>
    <label>
      E-mail: <br>
      <input type="email" name="email" placeholder="email@example.com" data-qa="field-placeholder">
    </label>
    <br><br>
    <label>
      Password: <br>
      <input type="password" name="password" minlength="4" maxlength="12">
    </label>
  </fieldset>
  <fieldset class="fieldset-block">
    <legend>An interesting fact about you!</legend>
    <label>
      Do you love cats?
      <input type="radio" name="yes">Yes
      <input type="radio" name="no">No
    </label>
    <br><br>
    <label>
      What is your favorite color?
      <input type="color">
    </label>
    <br><br>
    <label>
      What time do you go to bed?
      <input type="time">
    </label>
    <br><br>
    <label>
      What are your favorite brandof cars?
      <select name="Cars" multiple>
        <option value="BMW">BMW</option>
        <option value="Audi">Audi</option>
        <option value="Lada">Lada</option>
      </select>
    </label>
    <br><br>
    <label>
      How do you rate our work?
      <input type="range">
    </label>
  </fieldset>
  <fieldset class="fieldset-block">
    <legend>Additional info</legend>
    <label>
      Comments:
      <textarea autocomplete="off" ></textarea>
    </label>
    <br><br>
    <label>
      Would you recommend us?
      <select name="Recommend">
        <option value="yes">yes</option>
        <option value="no">no</option>
      </select>
    </label>
  </fieldset>
  <button>Submit</button>
</form>
<script type="text/javascript" src="./main.js"></script>
</body>
</html>
