<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>HTML Form</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>

    <script type="text/javascript" src="./main.js"></script>

    <form action="https://mate-academy-form-lesson.herokuapp.com/create-application" onsubmit="onSubmit()"
      method="POST">

      <div class="information">
        <fieldset>
          <legend>Pesonal information</legend>

          <label for="Surname" class="block">
            Surname:

            <input
              type="text"
              name="Surname"
              id="Surname"
              autocomplete="off"
              required
            >
          </label>

          <label for="Name" class="block">
            Name:
            <input
              type="text"
              name="Name"
              id="Name"
              autocomplete="off"
              required
            >
          </label>

          <label for="Age" class="block">
            How old are You?
            <input
              type="number"
              name="Age"
              id="Age"
              min="0"
              max="100"
              value="12"
              required
            >
          </label>

          <label for="birthday" class="block">
            Full date of birth:
            <input
              type="date"
              name="birthday"
              id="birthday"
              min="0"
              value="12"
              required
            >
          </label>

          <label for="agreement" class="block">
            I accept the term of the agreement
            <input
            type="checkbox"
            name="agreement"
            id="agreement"
            required
          >
          </label>

        </fieldset>
      </div>

      <div class="information">
        <fieldset>
          <legend>Registration</legend>

          <label for="email" class="block">
            E-mail:
            <input
              type="email"
              name="email"
              id="email"
              placeholder="email@example.com"
              required
            >
          </label>

          <label for="password" class="block">
            Password:
            <input
              type="password"
              name="password"
              id="password"
              minlength="8"
              maxlength="24"
              required
            >
          </label>

        </fieldset>
      </div>

      <div class="information">
        <fieldset>
          <legend>An interesting fact about you!</legend>

          <div class="block">
            Do you love cats?

            <input
              type="radio"
              name="cat"
              id="yes"
              value="yes"
            >
            <label for="yes">Yes</label>

            <input
              type="radio"
              name="cat"
              id="no"
              value="no"
            >
            <label for="no">No</label>
          </div>


          <label for="color" class="block">
            What is your favorite color?
            <input
              type="color"
              name="color"
              id="color"
              required
            >
          </label>

          <label for="time" class="block">
            What time do you go to bed?
            <input
              type="time"
              name="time"
              id="time"
              required
            >
          </label>

          <label for="cars" class="block">
            What are your favorite brand of cars?

            <select
              name="cars"
              id="cars"
              multiple
            >
              <option value="BMW">BMW</option>
              <option value="audi">Audi</option>
              <option value="lada">Lada</option>
            </select>

          </label>

          <label for="rate" class="block">
            How do you rate our work?
            <input
              type="range"
              name="rate"
              id="rate"
              min="0"
              max="10"
              value="0"
            >
          </label>

        </fieldset>
      </div>

      <div class="information">
        <fieldset>
          <legend>Additonal info:</legend>

          <label for="comments" class="block">
            Comments:
            <textarea name="comments" id="comments"></textarea>
          </label>

          <label for="advice" class="block">
            Would you recommend us?

            <select
              name="advice"
              id="advice"
              required
            >
              <option value="yes">Yes</option>
              <option value="no">No</option>
            </select>

          </label>

        </fieldset>
      </div>
      <button type=" submit ">Submit</button>

    </form>

  </body>
</html>
