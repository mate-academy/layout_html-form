<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    >
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>HTML Form</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <script type="text/javascript" src="./main.js"></script>

    <form method="POST"
    onsubmit="onSubmit()"
    >
      <fieldset name="Personal_info"
      class="field"
      >
        <legend>Personal information</legend>
        <div class="input">
          <label for="surname">
            Surname:
          </label>
          <input type="text"
          name="surname"
          id="surname"
          autocomplete="off"
          >
        </div>
        <div class="input">
          <label for="name">
            Name:
          </label>
          <input type="text"
          name="name"
          id="name"
          autocomplete="off"
          >
        </div>
        <div class="input">
          <label for="age">
            How old are You?
          </label>
          <input type="number"
          name="age"
          min="1"
          max="100"
          value="12"
          id="age"
          >
        </div>
        <div class="input">
          <label for="date">
            Full date of birth:
          </label>
          <input type="date"
          name="date"
          id="date"
          >
        </div>
        <div class="input">
          <label for="terms">
            I accept the term of the agreement
          </label>
          <input type="checkbox"
          id="terms"
          required
          >
        </div>
      </fieldset>
    </form>

    <form method="POST"
    onsubmit="onSubmit()"
    >
      <fieldset class="field">
        <legend>Registration</legend>
        <div class="input">
          <label for="email">
            E-mail:
          </label>
          <input type="email"
          id="email"
          placeholder="email@example.com"
          autocomplete="off"
          required
          >
        </div>
        <div class="input">
          <label for="pass">
            Password:
          </label>
          <input type="password"
          minlength="5"
          maxlength="30"
          id="pass"
          required
          >
        </div>
      </fieldset>
    </form>

    <form method="POST" onsubmit="onSubmit()">
      <fieldset class="field">
        <legend>An interesting fact about you!</legend>
        <div class="input">
          Do you love cats?

          <input type="radio"
            name="cat"
            value="yes"
            id="cat_yes"
            >
          <label for="cat_yes">Yes</label>

          <input type="radio"
            name="cat"
            value="no"
            id="cat_no"
            >
          <label for="cat_no">No</label>
        </div>

        <div class="input">
          <label for="color">
            What is your favorite color?
          </label>
          <input type="color"
          id="color"
          >
        </div>

        <div class="input">
          <label for="bed">
            What time do you go to bed?
          </label>
          <input type="time"
          id="bed"
          >
        </div>

        <div class="input">
          <label for="cars">
            What are your favorite brand of cars?
          </label>
          <select id="cars"
          multiple
          >
            <option>BMW</option>
            <option>Audi</option>
            <option>Lada</option>
          </select>
        </div>

        <div class="input">
          <label for="rate">
            How do you rate our work?
          </label>
          <input type="range"
          id="rate"
          >
        </div>
      </fieldset>
    </form>

    <form  method="POST"
    onsubmit="onSubmit()"
    >
      <fieldset class="field">
        <legend>Additional info:</legend>
        <div class="input">
          <label for="com">
            Comments:
          </label>
          <textarea name="comments"
          id="com"
          cols="20"
          rows="2"
          placeholder="input something please">
          </textarea>
        </div>
        <div class="input">
          <label for="fin">
            Would you recommend us?
          </label>
          <select name="final"
          id="fin"
          required
          >
            <option value="final">yes</option>
            <option value="final">no</option>
          </select>
        </div>
      </fieldset>
    </form>

    <button type="submit" class="button">Submit</button>
  </body>
</html>
