<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>HTML Form</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
<form>
  <fieldset class="fieldset-offset">
    <legend>Personal information</legend>
    <label for="surname" class="form-label">Surname:
      <input type="text" name="name" id="surname" required>
    </label>
    <label for="firstName" class="form-label little-offset">Name:
      <input type="text" name="name" id="firstName">
    </label>
    <label for="age" class="form-label little-offset">How old are You?
      <input type="number" min="5" max="100" value="12" name="date" id="age">
    </label>
    <label for="dateOfBirth" class="form-label little-offset ">Full date of birth:
      <input type="date" name="date" id="dateOfBirth">
    </label>
    <label for="accept" class="form-label little-offset">I accept the term of the agreement
      <input type="checkbox" name="acceptCheck" id="accept">
    </label>
  </fieldset>

  <fieldset class="fieldset-offset">
    <legend>Registration</legend>
    <label for="email" class="form-label">E-mail:
      <input type="email" name="name" id="email" placeholder="email@example.com">
    </label>
    <label for="password" class="form-label little-offset">Password:
      <input type="password" name="name" id="password" minlength="8">
    </label>
  </fieldset>

  <fieldset class="fieldset-offset">
    <legend>An interesting fact about you!</legend>
    <p class="first-elem">Do you love cats?
      <input type="radio" name="question"> Yes
      <input type="radio" name="question" > No
    </p>
    <label for="checkColor" class="form-label little-offset">What is your favorite color?
      <input type="color" name="question" id="checkColor" value="#000">
    </label>
    <label for="timeToBed" class="form-label little-offset">What time do you go to bed?
      <input type="time" step="1" name="time" id="timeToBed">
    </label>
    <label for="cars" class="form-label little-offset">What are your favorite brand of cars?
      <select name="select" id="cars" multiple size="4">
        <option value="bmw" class="without-margin-top">BMW</option>
        <option value="audi" class="without-margin-top">Audi</option>
        <option value="lada" class="without-margin-top">Lada</option>
      </select>
    </label>
    <label for="rate" class="form-label little-offset">How do you rate our work?
      <input type="range" value="0" name="" id="rate" min="0" max="100">
    </label>
  </fieldset>

  <fieldset class="fieldset-offset">
    <legend>Additional info: </legend>
    <label for="comments" class="form-label">Comments:
      <textarea id="comments" name="area"> </textarea>
    </label>
    <label for="recommend" class="form-label little-offset">Would you recommend us?
      <select name="recommendUs" id="recommend">
        <option value="yes">yes</option>
        <option value="no">no</option>
      </select>
    </label>
  </fieldset>
  <input type="submit" onsubmit="onSubmit()">
</form>

  <script type="text/javascript" src="./main.js"></script>
</body>
</html>
