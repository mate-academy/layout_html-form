<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    >
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>HTML Form</title>
    <link rel="stylesheet" href="./style.css">
  </head>

  <body>

    <form
      action="https://mate-academy-form-lesson.herokuapp.com/create-application"
      method="post"
      onsubmit="onSubmit()"
    >

      <fieldset>
        <legend>Personal information</legend>

        <label class="form-field" for="surname">
          Surname:
          <input
            type="text"
            name="surname"
            id="surname"
            autocomplete="off"
            required
          >
        </label>

        <label class="form-field" for="name">
          Name:
          <input
            type="text"
            name="name"
            id="name"
            autocomplete="off"
            required
          >
        </label>

        <label class="form-field" for="age">
          How old are You?
          <input
            type="number"
            name="age"
            id="age"
            value="12"
            min="12"
            max="100"
            required
          >
        </label>

        <label class="form-field" for="dob">
          Full date of birth:
          <input
            type="date"
            name="date-of-birth"
            id="dob"
            required
          >
        </label>

        <label class="form-field" for="terms">
          I accept the term of the agreement
          <input
            type="checkbox"
            name="terms-and-conditions"
            id="terms"
            required
          >
        </label>
      </fieldset>

      <fieldset>
        <legend>Registration</legend>

        <label class="form-field" for="email">
          E-mail:
          <input
            type="email"
            name="email"
            id="email"
            placeholder="email@example.com"
            autocomplete="off"
            required
          >
        </label>

        <label class="form-field" for="password">
          Password:
          <input
            type="password"
            name="password"
            id="password"
            minlength="8"
            maxlength="32"
            autocomplete="off"
            required
          >
        </label>
      </fieldset>

      <fieldset>
        <legend>An interesting fact about you!</legend>

        <div class="form-field">
          Do you love cats?

          <label for="love-cats-yes">
            <input
              type="radio"
              name="love-cats"
              id="love-cats-yes"
              value="1"
            >
            Yes
          </label>

          <label for="love-cats-no">
            <input
              type="radio"
              name="love-cats"
              id="love-cats-no"
              value="0"
            >
            No
          </label>
        </div>

        <label class="form-field" for="fav-color">
          What is your favorite color?
          <input
            type="color"
            name="favorite-color"
            id="fav-color"
          >
        </label>

        <label class="form-field" for="bed-time">
          What time do you go to bed?
          <input
            type="time"
            name="bed-time"
            id="bed-time"
          >
        </label>

        <label class="form-field" for="fav-cars">
          What are your favorite brands of cars?
          <select
            name="fav-cars"
            id="fav-cars"
            size="4"
            multiple
          >
            <option value="bmw">BMW</option>
            <option value="audi">Audi</option>
            <option value="lada">Lada</option>
          </select>
        </label>

        <label class="form-field" for="rate-us">
          How do you rate our work?
          <input
            type="range"
            name="rate-us"
            id="rate-us"
            min="0"
            max="100"
            step="5"
          >
        </label>
      </fieldset>

      <fieldset>
        <legend>Additional info:</legend>

        <label class="form-field" for="comment">
          Comments:
          <textarea
            name="comment-section"
            id="comment"
            cols="20"
            rows="2"
          >
          </textarea>
        </label>

        <label class="form-field" for="recommend">
          Would you recommend us?
          <select
            name="recommend"
            id="recommend"
          >
            <option value="1">Yes</option>
            <option value="0">No</option>
          </select>
        </label>
      </fieldset>
      <button type="submit">Submit</button>
    </form>
    <script type="text/javascript" src="./main.js"></script>
  </body>
</html>
