<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>HTML Form</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <form action="https://mate-academy-form-lesson.herokuapp.com/create-application" autocomplete="off" method="post">
    <fieldset class="group">
      <legend>Personal information</legend>
      <label class="field" for="surname">Surname:
        <input type="text" name="surname" id="surname" required>
      </label>
      <label class="field" for="name">Name:
        <input type="text" name="name" id="name" required>
      </label>
      <label class="field" for="age">How old are you?
        <input type="number" name="age" id="age" value="12" min="0" max="100" step="1" required>
      </label>
      <label class="field" for="birth">Full date of birth:
        <input type="date" name="birth" id="birth">
      </label>
      <label class="field" for="agreement">I accept the term of the agreement
        <input type="checkbox" name="agreement" id="agreement" required>
      </label>
    </fieldset>
    <fieldset class="group">
      <legend>Registration</legend>
      <label class="field" for="email">E-mail:
        <input type="email" placeholder="email@example.com" name="email" id="email" multiple required>
      </label>
      <label class="field" for="password">Password:
        <input type="password" name="password" id="password" minlength="8" maxlength="16" required>
      </label>
    </fieldset>
    <fieldset class="group">
      <legend>An interesting fact about you!</legend>
        <div class="field">Do you love cats?
          <input type="radio" name="yes" id="yes">
          <label for="yes">Yes</label>
          <input type="radio" name="no" id="no">
          <label for="no">No</label>
        </div>
      <label class="field" for="color">What is your favorite color?
        <input type="color" name="color" id="color">
      </label>
      <label class="field" for="sleep">What time do you go to bed?
        <input type="time" name="sleep" id="sleep" step="2">
      </label>
      <label class="field" for="car">What is your favourite brand of cars?
        <select name="car" id="car" multiple>
          <option value="bmv">BMV</option>
          <option value="audi">Audi</option>
          <option value="lada">Lada</option>
        </select>
      </label>
      <label class="field" for="rate">How do you rate our work?
        <input type="range" name="rate" id="rate" min="1" max="10" value="1">
      </label>
    </fieldset>
    <fieldset class="group">
      <legend>Additional info:</legend>
      <label class="field" for="comments">Comments:
        <textarea name="comments" id="comments" cols="20" rows="2"></textarea>
      </label>
      <label class="field" for="recomendation">Would you recommend us?
        <select name="recomendation" id="recomendation">
          <option value="yes">yes</option>
          <option value="no">no</option>
        </select>
      </label>
    </fieldset>
  </form>
  <input type="submit" name="submit" value="Submit" onsubmit="onSubmit()" required>
  <script type="text/javascript" src="./main.js"></script>
</body>
</html>
