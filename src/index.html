<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    >
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>HTML Form</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <h1>HTML Form</h1>
    <form
      action="https://mate-academy-form-lesson.herokuapp.com/create-application"
      method="POST"
      onsubmit="onSubmit()"
    >

      <fieldset class="block">
        <legend>Personal information</legend>

        <label for="surname" class="field">
          Surname:
          <input
            id="surname"
            name="surname"
            type="text"
            autocomplete="off">
        </label>
        <label for="name" class="field">
          Name:
          <input
            id="name"
            name="name"
            type="text"
            autocomplete="off">
        </label>
        <label for="years" class="field">
          How old are You?
          <input
            id="years"
            name="years"
            type="number"
            value="12"
            min="12"
            max="100">
        </label>
        <label for="date" class="field">
          Full date of birth:
          <input
            id="date"
            name="date"
            type="date">
        </label>
        <label for="terms" class="field">
          I accept the terms of the agreement
          <input
            id="terms"
            name="terms"
            type="checkbox"
            required>
        </label>
      </fieldset>

      <fieldset class="block">
        <legend>Registration</legend>

        <label for="email" class="field">
          E-mail:
          <input
            id="email"
            name="email"
            type="email"
            required placeholder="email@example.com">
        </label>
        <label for="pass" class="field">
          Password:
          <input
            id="pass"
            name="pass"
            type="password"
            required
            minlength="5"
            maxlength="30">
        </label>
      </fieldset>

      <fieldset class="block">
        <legend>An interesting fact about you</legend>

        <label for="lovecats" class="field">
          Do you love cats?
          <input
            id="lovecats"
            name="lovecats"
            type="radio"
            value="yes">Yes
          <input
            name="lovecats"
            type="radio"
            value="no">No
        </label>
        <label for="color" class="field">
          What is your favorite color?
          <input
            id="color"
            name="color"
            type="color">
        </label>
        <label for="timetobed" class="field">
          What time do you go to bed?
          <input
            type="time"
            name="timetobed"
            id="timetobed">
        </label>
        <label for="cars" class="field">
          What are you favorite brand of cars?
          <select
            name="cars"
            id="cars"
            multiple>
            <option value="BMV">BMV</option>
            <option value="Aidi">Audi</option>
            <option value="Lada">Lada</option>
          </select>
        </label>
        <label for="rate" class="field">
          How do you rate our work?
          <input
              type="range"
              id="rate"
              name="rate"
              value="0">
        </label>
      </fieldset>

      <fieldset class="block">
        <legend>Additional info:</legend>

        <label for="comment" class="field">
          Comments:
          <textarea
            name="comment"
            id="comment"
            cols="30"
            rows="10">
          </textarea>
        </label>
        <label for="recommend" class="field">
          Would you recommend us?
          <select name="recommend" id="recommend">
            <option value="yes">Yes</option>
            <option value="no">No</option>
          </select>
        </label>
      </fieldset>

      <button
        type="submit"
        class="block"
        name="submit">
          Submit
      </button>

    </form>

    <script type="text/javascript" src="./main.js"></script>
  </body>
</html>
