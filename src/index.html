<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width,
          user-scalable=no,
          initial-scale=1.0,
          maximum-scale=1.0,
          minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <form name="personal">
    <fieldset>
    <legend>
      Personal information
    </legend>
    <div class="person">
    <label for="surname">Surname: </label><input type="text" name="surname" id="surname"><br>
    <label for="name">Name: </label><input type="email" name="name" id="name"><br>
    <label for="age">How old are You? </label><input type="text" name="age" size="5" value="12" id="age"><br>
    <label for="date">Full date of birth: </label><input type="date" name="date" id="date"><br>
    <label for="check">I accept the term of the agreement </label><input type="checkbox" name="check" id="check">
    </div>
    </fieldset>
    <fieldset>
      <legend>
        Registration
      </legend>
      <div class="registration">
          <label for="email">E-mail: </label><input type="email" name="email" placeholder="email@example.com" id="email"><br>
          <label for="password">Password: </label><input type="password" name="password" id="password">
      </div>
    </fieldset>
    <fieldset>
      <legend>
        An interesting fact about you!
      </legend>
    <label for="cats">Do you love cats? </label>
    <input type="radio" name="yes" value="yes" id="cats">Yes
    <input type="radio" name="no" value="no" id="">No<br>
    <label for="color">What is your favorite color? </label><input type="color" name="color" id="color"><br>
    <label for="time">What time do you go to bed? </label><input type="time" name="time" id="time"><br>
       What are your favorite brand of cars?
    <select name="cars" size="4">
          <option value="BMW">BMW</option>
          <option value="Audi">Audi</option>
          <option value="Lada">Lada</option>
        </select>
        <div class="range">
        How do you rate your work?
        <input type="range" min="0" max="12" step="1" value="0">
      </div>
    </fieldset>
    <fieldset>
      <legend>
        Additional info:
      </legend>
      <div class="rec">
      Comments:
      <textarea name="comment" cols="20" rows="2"></textarea>
    </div>
        Would you recommend us?
    <select name="yes_or_no" size="1">
        <option value="yes">yes</option>
        <option value="no">no</option>
        </select>
    </fieldset>
    <button>Submit</button>
  </form>
<script type="text/javascript" src="./main.js"></script>
</body>
</html>
