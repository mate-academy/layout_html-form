<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>HTML Form</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <form class="form" action="https://mate-academy-form-lesson.herokuapp.com/create-application" method="POST">
    <fieldset class="form-filset">
      <legend>Personal information</legend>
      <div class="form-item">
        <label>Surname:
        <input name="surname"  type="text"></label>
      </div>
      <div class="form-item">
        <label>Name:
        <input name="name" type="text"></label>
      </div>
      <div class="form-item">
        <label>How old are You?
        <input name="age"  type="number" value="12" min="0" max="120"></label>
      </div>
      <div class="form-item">
        <label>Full date of birth:
        <input name="birth"  type="date"></label>
      </div>
      <div class="form-item">
        <label>I accept the term of the agreement
        <input name="agree"  type="checkbox"></label>
      </div>
    </fieldset>
    <fieldset class="form-filset">
      <legend>Registration</legend>
      <div class="form-item">
        <label>E-mail:
        <input placeholder="email@example.com" name="email"  type="email"></label>
      </div>
      <div class="form-item">
        <label>Password:
        <input name="password" type="password" required></label>
      </div>
    </fieldset>
    <fieldset class="form-filset">
      <legend>An interesting fact about you!</legend>
      <div class="form-item">
        <span>Do you love cats? </span>
        <label><input name="cat"  type="radio">Yes</label>
        <label><input name="cat" type="radio">No</label>
      </div>
      <div class="form-item">
        <label>What is your favorite color?<input type="color" name="color"></label>
      </div>
      <div class="form-item">
        <label>What time do you go to bed?<input type="time" name="sleep"  step="1"></label>
      </div>
      <div class="form-item">
        <span>What are your favorite brand of cars? </span>
        <select name="car" id="car" multiple>
          <option value="bmv">BMW</option>
          <option value="audi">Audi</option>
          <option value="lada">Lada</option>
          <option value=""></option>
        </select>
      </div>
      <div class="form-item">
        <label>How do you rate our work?<input  min="1" max="100" step="1" value="1" type="range"></label>
      </div>
    </fieldset>
    <fieldset class="form-filset">
      <legend>Additional info:</legend>
      <div class="form-item">
        <label>Comments: <textarea name="comments"></textarea></label>
      </div>
      <div class="form-item">
        <label>Would you recommend us?
          <select name="recommend">
            <option value="yes" selected>Yes</option>
            <option value="no">No</option>
          </select>
        </label>
      </div>
    </fieldset>
    <button class="form-submit" type="submit" onsubmit="onSubmit()">Submit</button>
  </form>
  <script type="text/javascript" src="./main.js"></script>
</body>
</html>
