<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    >
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>HTML Form</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <h1>HTML Form</h1>

    <form
    action="https://mate-academy-form-lesson.herokuapp.com/create-application"
    method="POST"
    onsubmit="onSubmit()"
    >
      <fieldset class="fieldset">
        <legend>Personal information</legend>

        <div class="form-field">
          <label for="second-name">
            Surname:
            <input
              type="text"
              name="surname"
              id="second-name"
              disabled
            >
          </label>
        </div>

        <div class="form-field">
          <label for="first-name">
            Name:
            <input
              type="text"
              name="name"
              id="first-name"
              disabled
            >
          </label>
        </div>

        <div class="form-field">
          <label for="birth">
            Full date of birth:
            <input
              type="date"
              name="date"
              id="birth"
              min="1921-01-01"
              max="2009-01-01"
            >
          </label>
        </div>

        <div class="form-field">
          <label for="term">
            I accept the term of the agreement
            <input
              type="checkbox"
              name="acception"
              id="term"
            >
          </label>
        </div>
      </fieldset>

      <fieldset class="fieldset">
        <legend>Registration</legend>

        <div class="form-field">
          <label for="mail">
            E-mail:
            <input
              type="email"
              name="email"
              id="mail"
              placeholder="email@example.com"
            >
          </label>
        </div>

        <div class="form-field">
          <label for="parole">
            Password:
            <input
              type="password"
              name="password"
              id="parole"
              minlength="8"
              maxlength="16"
              required
            >
          </label>
        </div>
      </fieldset>

      <fieldset class="fieldset">
        <legend>An interesting fact about you!</legend>

        <div class="form-field">
          Do you love cats?
          <label for="love-cats-yes">yes</label>

          <input
            type="radio"
            name="cats"
            id="love-cats-yes"
            value="y"
          >

          <label for="love-cats-no">no</label>

          <input
            type="radio"
            name="cats"
            id="love-cats-no"
            value="n"
          >
        </div>

        <div class="form-field">
          <label for="favorite-color">
            What is your favorite color?
            <input
              type="color"
              name="color"
              id="favorite-color"
            >
          </label>
        </div>

        <div class="form-field">
          <label for="when">
            What time do you go to bed?
            <input
              type="time"
              name="time"
              id="when"
              step="1"
            >
          </label>
        </div>

        <div class="form-field">
          <label for="favorite-cars">
            What are your favorite brand of cars?
            <select
              name="cars"
              id="favorite-cars"
              multiple
            >
              <option value="BMW">BMW</option>
              <option value="Audi">Audi</option>
              <option value="Lada">Lada</option>
            </select>
          </label>
        </div>

        <div class="form-field">
          <label for="rate">
            How do you rate our work?
            <input
              type="range"
              name="range"
              id="rate"
              value="0"
            >
          </label>
        </div>
      </fieldset>

      <fieldset class="fieldset">
        <legend>Additional info</legend>

        <div class="form-field">
          <label for="comments">
            Comments:
            <textarea
              name="feedback" id="comments">
            </textarea>
          </label>
        </div>

        <div class="form-field">
          <label for="recommend">
            Would you recommend us?
            <select name="advise" id="recommend">
              <option value="yes">yes</option>
              <option value="no">no</option>
            </select>
          </label>
        </div>
      </fieldset>

      <button type="submit" class="button">Submit</button>
    </form>

    <script type="text/javascript" src="./main.js"></script>
  </body>
</html>
