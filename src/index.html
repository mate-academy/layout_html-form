<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    >
    <meta
      http-equiv="X-UA-Compatible"
      content="ie=edge"
    >
    <title>
      HTML Form
    </title>
    <link
      rel="stylesheet"
      href="./style.css"
    >
  </head>
  <body>
    <form
      action="https://mate-academy-form-lesson.herokuapp.com/create-application"
      method="POST"
    >
      <fieldset>
        <legend>
          Personal information
        </legend>
        <label for="surname" class="input-container">
          Surname:
          <input
            type="text"
            name="surname"
            id="surname"
          >
        </label>
        <label for="userName" class="input-container">
          Name:
          <input
            type="text"
            name="userName"
            id="userName"
          >
        </label>
        <label for="userAge" class="input-container">
          How old are You?
          <input
            type="number"
            value="12"
            min="1"
            max="100"
            name="userAge"
            id="userAge"
          >
        </label>
        <label for="userBirthDate" class="input-container">
          Full date of birth:
          <input
            type="date"
            name="userBirthDate"
            id="userBirthDate"
          >
        </label>
        <label
          for="isAccept"
          class="reset-indent input-container"
        >
          I accept the term of the agreement
          <input
            type="checkbox"
            name="isAccept"
            required
            class="inline"
            id="isAccept"
          >
        </label>
      </fieldset>
      <fieldset>
        <legend>
          Registration
        </legend>
        <label for="email" class="input-container">
          E-mail:
          <input
            type="email"
            name="email"
            placeholder="email@example.com"
            required
            id="email"
          >
        </label>
        <label
          for="password"
          class="reset-indent input-container"
        >
          Password:
          <input
            type="password"
            name="password"
            required
            minlength="8"
            maxlength="16"
            id="password"
          >
        </label>
      </fieldset>
      <fieldset>
        <legend>
          An interesting fact about you!
        </legend>
        <label for="LoveCats" class="input-container">
          Do you love cats?
          <input
            type="radio"
            name="LoveCats"
            value="Yes"
            class="inline"
            id="LoveCats"
          >
          <label for="LoveCats" class="inline input-container">
            Yes
          </label>
          <input
            type="radio"
            name="LoveCats"
            value="No"
            class="inline"
            id="dontLoveCats"
          >
          <label for="dontLoveCats" class="inline input-container">
            No
          </label>
        </label>
        <label for="favColor" class="input-container">
          What is your favorite color?
          <input
            type="color"
            name="favColor"
            class="inline"
            id="favColor"
          >
        </label>
        <label for="bedTime" class="input-container">
          What time do you go to bed?
          <input
            type="time"
            name="bedTime"
            class="inline"
            id="bedTime"
          >
        </label>
        <label for="carBrand" class="input-container">
          What are your favourite brand of cars?
          <select
            name="carBrand"
            multiple
            id="carBrand"
          >
            <option value="bmw">
              BMW
            </option>
            <option value="audi">
              Audi
            </option>
            <option value="lada">
              Lada
            </option>
          </select>
        </label>
        <label for="ourWork" class="reset-indent input-container">
          How do you rate our work?
          <input
            type="range"
            name="ourWork"
            min="0"
            max="50"
            id="ourWork"
          >
        </label>
      </fieldset>
      <fieldset>
        <legend>
          Additional info
        </legend>
        <label for="comments" class="input-container">
          Comments:
          <textarea
            name="comments"
            id="comments"
          >
          </textarea>
        </label>
        <label for="recomend" class="reset-indent input-container">
          Would you recomend us?
          <select name="recomend" id="recomend">
            <option value="true">
              Yes
            </option>
            <option value="false">
              No
            </option>
          </select>
        </label>
      </fieldset>
      <button onsubmit="onSubmit()" type="submit">
        Submit
      </button>
    </form>
    <script type="text/javascript" src="./main.js"></script>
  </body>
</html>
