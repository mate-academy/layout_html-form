<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>HTML Form</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <form>
      <fieldset autocomplete="off" class="fieldset">
        <legend>Personal information</legend>
        <div class="input">
          <label for="surname">Surname:</label>
          <input type="text" id="surname">
        </div>

        <div class="input">
          <label for="name">Name:</label>
          <input type="text" id="name">
        </div>

        <div class="input">
          <label for="number">How old are You?</label>
          <input type="number"
           id="number"
           value="12"
           min="1"
           max="100">
        </div>

        <div class="input">
          <label for="date">Full date of birth:</label>
          <input type="date" id="date">
        </div>

        <div class="list input">
          <label for="agree">I accept the term of the agreement</label>
          <input type="checkbox" id="agree">
        </div>
      </fieldset>

      <fieldset autocomplete="off" class="fieldset">
        <legend>Registration</legend>
        <div class="input">
          <label for="email">E-mail:</label>
          <input type ="email"
           id="email"
           placeholder="email@example.com"
           mixlength="8">
        </div>

        <div class="list input">
          <label for="password">Password:</label>
          <input
           type="text"
           maxlength="50"
           id="password">
        </div>
      </fieldset>

      <fieldset autocomplete="off" class="fieldset">
        <legend>An interesting fact about you!</legend>

        <div class="input">
          <div>Do you love cats?
            <input
             type="radio"
             id="yes"
             name="cats">
            <label for="yes">Yes</label>
            <input
             type="radio"
             id="no"
             name="cats">
            <label for="no">No</label>
          </div>
        </div>

        <div class="input">
          <label for="favcolor">What is your favorite color?</label>
          <input
           type="color"
           id="favcolor"
           name="favcolor" >
        </div>

        <div class="input">
          <label for="appt">What time do you go to bed?</label>
          <input type="time"
           id="appt"
           name="appt"
           required>
        </div>

        <div class="input">
          <label for="cars-select">What are your favorite brand of cars?</label>
          <select id="cars-select"
           name="cars"
           multiple
           size="4">
            <option value="BMW">BMW</option>
            <option value="Audi">Audi</option>
            <option value="Lada">Lada</option>
          </select>
        </div>

        <div class="list input">How do you rate our work?
          <input type="range"
           id="start"
           value="10"
          name="rate"
          min="1"
          max="10">
        </div>
      </fieldset>

      <fieldset autocomplete="off" class="fieldset">
        <legend>Additional info:</legend>

        <div class="input">
          <label for="story">Comments:</label>
          <textarea id="story" name="story"></textarea>
        </div>

        <div class="list input">
          <label for="recommend-select">Would you recommend us?</label>
          <select id="recommend-select">
            <option value="yes">yes</option>
            <option value="no">no</option>
          </select>
        </div>
      </fieldset>

      <script type="text/javascript" src="./main.js"></script>

      <input
         action="https://mate-academy-form-lesson.herokuapp.com/create-application"
         type="submit"
         id="onsubmit='onSubmit()'"
         value="Submit">
    </form>
  </body>
</html>
