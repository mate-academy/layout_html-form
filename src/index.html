<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    >
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>HTML Form</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <form
    action="https://mate-academy-form-lesson.herokuapp.com/create-application"
    onsubmit="onSubmit()" method="POST"
    >

      <fieldset>
        <legend>Personal information</legend>
        <div class="form-field">
          <label for="Surname">Surname:</label>
          <input
          type="text" id="Surname"
          autocomplete="off" required
          >
        </div>
        <div class="form-field">
          <label for="Name">Name:</label>
          <input
          type="text" id="Name"
          autocomplete="off" required
          >
        </div>
        <div class="form-field">
          <label for="age">How old are you?</label>
          <input
          type="number" min="12"
          max="100" id="age"
          value="12" required
          >
        </div>
        <div class="form-field">
          <label for="birth">Full date of birth:</label>
          <input type="date" id="birth">
        </div>
        <div>
          <label for="Terms">I accept the term of the agreement</label>
          <input
          type="checkbox" required
          id="Terms" checked
          >
        </div>
      </fieldset>

      <fieldset>
        <legend>Registration</legend>

        <div class="form-field">
          <label for="email">E-mail:</label>
          <input
          type="email" id="email"
          placeholder="email@example.com"
          autocomplete="off" required
          >
        </div>

        <div>
          <label for="password">Password:</label>
          <input
          type="password" id="password"
          minlength="8" maxlength="32"
          autocomplete="off" required
          >
        </div>
      </fieldset>

      <fieldset>
        <legend>An interesting fact about you!</legend>
        <div class="form-field">
          Do you love cats?
          <input
          type="radio" id="yes"
          name="yes_no">
          <label for="yes">Yes</label>
          <input
          type="radio" id="no"
          name="yes_no"
          >
          <label for="no">no</label>
        </div>

        <div class="form-field">
          <label for="color">What is your favorite color?</label>
          <input
          type="color" id="color"
          value="#000"
          >
        </div>

        <div class="form-field">
          <label for="time_to_go_to_bed">What time do you go to bed?</label>
          <input type="time" id="time_to_go_to_bed">
        </div>

        <div class="form-field">
          <label for="brand_of_cars">What are you favorite brand of cars?</label>
          <select
          name="color"
          id="brand_of_cars"
          multiple
          >
            <option value="BMW">BMW</option>
            <option value="Audi">Audi</option>
            <option value="Lada">Lada</option>
          </select>
        </div>

        <div>
          <label for="rate_of_work">How do you rate our work?</label>
          <input
          type="range" id="rate_of_work"
          value="0"
          >
        </div>
      </fieldset>

      <fieldset>
        <legend>Additional info:</legend>
        <div class="form-field">
          <label for="Comments">Comments:</label>
          <textarea name="feedmack" id="Comments"></textarea>
        </div>

        <div>
          <label for="recommend">Would you recommend us?</label>
          <select name="feedback" id="recommend">
            <option value="yes" selected>yes</option>
            <option value="no">no</option>
          </select>
        </div>
      </fieldset>

      <button type="submit">Submit</button>
    </form>

    <script type="text/javascript" src="./main.js"></script>
  </body>
</html>
