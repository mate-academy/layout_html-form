<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width,
          user-scalable=no,
          initial-scale=1.0,
          maximum-scale=1.0,
          minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <form action="https://mate-academy-form-lesson.herokuapp.com/create-application" method="post">
    <fieldset>
      <legend>Personal information</legend>
    <div>
      <label>Surname:<input autocomplete="of" name="Surname" type="text" autofocus></label>
    </div>
    <div>
      <label>Name:<input autocomplete="of" name="Name" type="text" minlength="2"></label>
    </div>
    <div>
      <label>How old are You?<input name="age" type="number" value="12" data-qa="field-value" step="1"></label>
    </div>
      <div>
      <label>Full date of birthday:<input name="dateBirthday" type="date" max="25-04-2019"></label>
    </div>
    <div>
      <label>I accept the term of the agreement<input name="accept" type="checkbox"></label>
    </div>
    </fieldset>
    <fieldset>
      <legend>Registration</legend>
      <div>
      <label>E-mail: <input name="E-mail" type="email" placeholder="email@example.com" data-qa="field-placeholder"></label>
      </div>
      <div>
      <label>Password: <input name="Password" type="password" minlength="4"></label>
    </div>
    </fieldset>
    <fieldset>
      <legend>An interesting fact about you!</legend>
      <div>
      Do you love cats?
      <label><input name="cat" type="radio"> Yes</label>
      <label><input name="cat" type="radio"> No</label>
      </div>
      <div>
      <label>What is your favorite color?<input type="color" name="color"></label>
    </div>
    <div>
      <label>What time do you go bed?<input name="timeGoBed" type="time"></label>
    </div>
    <div>
      <label>What your favorite brand of cars?
        <select name="cars" multiple>
          <option>BMW</option>
            <option>Audi</option>
            <option>Lada</option>
          </select>
      </label>
    </div>
    <div>
      <label>How do you rate our work?<input type="range" name="rate" min="0" max="10" step="0.5"></label>
    </div>
    </fieldset>
    <fieldset>
      <legend>Additional info:</legend>
      <div>
      <label>Comments:<textarea name="Comments" required></textarea></label>
      </div>
      <div>
      <label>Would you recommend us?
          <select name="recommend">
            <option selected="selected">yes</option>
              <option>no</option>
            </select>
          </label>
        </div>
    </fieldset>
    <div>
    <button type="submit" name="submit">Submit</button>
  </div>
  </form>

<script type="text/javascript" src="./main.js"></script>
</body>
</html>
