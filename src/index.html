<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    >
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>HTML Form</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <h1>HTML Form</h1>
    <script type="text/javascript" src="./main.js"></script>
    <form action="https://mate-academy-form-lesson.herokuapp.com/create-application"
    method="POST"
    onsubmit="onSubmit()">
      <fieldset class="field">
        <legend>Personal information</legend>

        <label for="surname"
        class="form__field">
          Surname:
          <input type="text"
          id="surname"
          name="surname"
          required>
        </label>

        <label for="name"
        class="form__field">
          Name:
          <input type="text"
          id="name"
          name="name"
          required>
        </label>

        <label for="old"
        class="form__field">
          How old are You?
          <input type="number"
          id="old"
          name="old"
          value="12"
          min="1" max="100"
          required>
        </label>

        <label for="date" class="form__field">
          Full date of birth:
          <input type="date"
          id="date"
          name="date"
          required>
        </label>

        <label for="checkbox" class="form__field">
          I accept the term of the agreement
          <input type="checkbox"
          id="checkbox"
          name="checkbox"
          required>
        </label>
      </fieldset>

      <fieldset class="field">
        <legend>Registration</legend>

        <label for="email" class="form__field">
          E-mail:
          <input type="email"
          id="email"
          name="email"
          placeholder="email@example.com"
          required>
        </label>

        <label for="password" class="form__field">
          Password
          <input type="password"
          id="password"
          name="password"
          minlength="8"
          maxlength="32"
          required>
        </label>
      </fieldset>

      <fieldset class="field">
        <legend>An interesting fact about you!</legend>

        <div class="form__field">
          Do you love cats?
          <label for="love">
            <input type="radio"
            id="love"
            name="love"
            value="y"
            checked>
            Yes
          </label>

          <label for="love">
            <input type="radio"
            name="love"
            value="n">
            No
          </label>
        </div>

        <label for="color" class="form__field">
          What is your favorite color?
          <input type="color"
          id="color"
          name="color">
        </label>

        <label for="time" class="form__field">
          What time do you go to bed?
          <input type="time"
          name="time"
          id="time">
        </label>

        <label for="cars" class="form__field">
          What are your favorite brand of cars?
          <select name="cars"
          multiple
          id="cars">
            <option value="BMW">BMW</option>
            <option value="Audi">Audi</option>
            <option value="Lada">Lada</option>
          </select>
        </label>

        <label for="range" class="form__field">
          How do you rate our work?
          <input type="range"
          id="range"
          name="range"
          value="0">
        </label>
      </fieldset>

      <fieldset class="field">
        <legend>Additional info:</legend>

        <label for="comments" class="form__field">
          Comments:
          <textarea name="comments"
          id="comments"
         ></textarea>
        </label>

        <label for="rec" class="form__field">
          Would you recommend us?
          <select name="rec"
          id="rec">
            <option value="yes">
              yes
            </option>
            <option value="no">
              no
            </option>
          </select>
        </label>
      </fieldset>
      <button type="submit">Submit</button>
    </form>
  </body>
</html>

<!-- Я спочатку виконав з картинки,
а потім побачив ТЗ в файлі readme.md,
тому в мене всі поля обернуті в label -->
