<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    >
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>HTML Form</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <form action="https://mate-academy-form-lesson.herokuapp.com/create-application"
          method="post"
          onsubmit="onSubmit()">
      <fieldset>
        <legend>Personal information</legend>
        <label for="surname">
          Surname:
          <input type="text"
                 id="surname"
                 name="surname"
                 autocomplete="off"
                 required>
        </label>
        <label for="name">
          Name:
          <input type="text"
                 id="name"
                 name="name"
                 autocomplete="off"
                 required>
        </label>
        <label for="howOld">
          How old are You:
          <input type="number"
                 id="howOld"
                 value="12"
                 name="howOld"
                 min="0"
                 max="100"
                 required>
        </label>
        <label for="birth">
          Full date of birth:
          <input type="date"
                 id="birth"
                 name="birth"
                 required>
        </label>
        <label for="agreement">
          I accept the term of the agreement
          <input type="checkbox"
                 id="agreement"
                 name="agreement"
                 required>
        </label>
      </fieldset>
      <fieldset>
        <legend>Registration</legend>
        <label for="email">
          E-mail:
          <input type="e-mail"
                 name="email"
                 id="email"
                 placeholder="email@example.com"
                 required>
        </label>
        <label for="password">
          Password:
          <input type="password"
                 name="password"
                 id="password"
                 required
                 minlength="6"
                 maxlength="32">
        </label>
      </fieldset>
      <fieldset>
        <legend>An interesting fact about you!</legend>
        <div class="inline">
          <label for="loveCatsYes">
            Do you love cats?
            <input type="radio"
                   name="loveCats"
                   id="loveCatsYes"
                   value="yse">Yes
          </label>
          <label for="loveCatsNo">
            <input type="radio"
                   name="loveCats"
                   id="loveCatsNo"
                   value="no">No
          </label>
        </div>
        <label for="favoriteColor">
          What is your favorite color?
          <input type="color"
                 name="favoriteColor"
                 id="favoriteColor">
        </label>
        <label for="goToBed">
          What time do you go to bed?
          <input type="time"
                 name="goToBed"
                 id="goToBed">
        </label>
        <label for="brandOfCars">
          What are your favorite brand of cars?
          <select name="brandOfCars"
                  id="brandOfCars"
                  multiple>
            <option value="BMW">BMW</option>
            <option value="Audi">Audi</option>
            <option value="Lada">Lada</option>
          </select>
        </label>
        <label for="rateOurWork">
          How do you rate our work?
          <input type="range"
                 name="rateOurWork"
                 id="rateOurWork"
                 value="0"
                 min="0"
                 max="100">
        </label>
      </fieldset>
      <fieldset>
        <legend>Additional info:</legend>
        <label for="comments">
          Comments:
          <textarea name="comments"
                    id="comments"
                    cols="18"
                    rows="2">
          </textarea>
        </label>
        <label for="recommend">
          Would you recommend us?
          <select name="recommend" id="recommend">
            <option value="yes" selected>yes</option>
            <option value="no">no</option>
          </select>
        </label>
      </fieldset>
      <button type="submit">Submit</button>
    </form>
    <script type="text/javascript" src="./main.js"></script>
  </body>
</html>
