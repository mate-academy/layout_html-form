<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width,
          user-scalable=no,
          initial-scale=1.0,
          maximum-scale=1.0,
          minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <form action="https://mate-academy-form-lesson.herokuapp.com/create-application" onsubmit="onSubmit(event)">
    <div class="form-fieldset">
        <fieldset class="fieldset">
          <legend>Personal information</legend>
          <div class="input-field">
            <label>
              Surname:
              <input type="text" name="surname" autocomplete="off">
            </label>
          </div>
          <div class="input-field">
            <label>
              Name:
              <input type="text" name="name" autocomplete="off">
            </label>
          </div>
          <div class="input-field">
            <label>
              How old are You?
              <input type="number" value="12" name="year" data-qa="field-value" min="3" max="100">
            </label>
          </div>
          <div class="input-field">
            <label>
              Full date of birth:
              <input type="date" name="birth">
            </label>
          </div>
          <div class="input-field">
            <label>
              I accept the term of the agreement
              <input type="checkbox" name="accept" required>
            </label>
          </div>
        </fieldset>
    </div>
    <div class="form-fieldset">
        <fieldset class="fieldset">
          <legend>Registration</legend>
          <div class="input-field">
            <label>
              E-mail:
              <input type="email" data-qa="field-placeholder" required name="email" placeholder="email@example.com">
            </label>
          </div>
          <div class="input-field">
            <label>
              Password:
              <input type="password" name="password" minlength="6" maxlength="30">
            </label>
          </div>
        </fieldset>
    </div>
    <div class="form-fieldset">
        <fieldset class="fieldset">
          <legend>An interesting fact about you!</legend>
          <div class="input-field">
            <label>
              Do you love cats?
              <input type="radio" name="cat">Yes
              <input type="radio" name="cat">No
            </label>
          </div>
          <div class="input-field">
            <label>
              What is your favorite color?
              <input type="color" name="color">
            </label>
          </div>
          <div class="input-field">
            <label>
              What time do you go to bed?
              <input type="time" name="gotobed">
            </label>
          </div>
          <div class="input-field">
            <label>
              What are your favorite brand of cars?
              <select name="cars" size="4">
                <option value="BMW">BMW</option>
                <option value="Audi">Audi</option>
                <option value="Lada">Lada</option>
              </select>
            </label>
          </div>
          <div class="input-field">
            <label>
              How do you rate our work?
              <input type="range" name="rate" min="1" max="10" step="1" value="1">
            </label>
          </div>
        </fieldset>
    </div>
        <div class="form-fieldset">
            <fieldset class="fieldset">
              <legend>Adittional info:</legend>
                <div class="input-field">
                  <label>
                    Comments
                    <textarea name="comment" required></textarea>
                  </label>
                </div>
                <div class="input-field">
                  <label>
                    Would you recommend us?
                    <select name="recom">
                      <option value="Yes">yes</option>
                      <option value="No">no</option>
                    </select>
                  </label>
                </div>
              </fieldset>
          </div>
          <button type="submit">Submit</button>
      </form>
<script type="text/javascript" src="./main.js"></script>
</body>
</html>
