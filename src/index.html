<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width,
          user-scalable=no,
          initial-scale=1.0,
          maximum-scale=1.0,
          minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <form action="https://mate-academy-form-lesson.herokuapp.com/create-application" method="get">
    <fieldset>
      <legend>Personal information</legend>
      <div class="field">
          <label>Surname: <input type="text" name="surname" minlength="2" maxlength="99" autocomplete="off"></label>
      </div>
      <div class="field">
        <label>Name: <input type="text" name="name" autocomplete="off"></label>
      </div>
      <div class="field">
        <label>How old are You? <input type="number" name="age" value="12" min="1" data-qa="field-value"></label>
      </div>
      <div class="field">
        <label>Full date of birthday: <input type="date" name="birthday" autocomplete="off"></label>
      </div>
      <div class="field">
        <label>I accept the term of the agreement <input type="checkbox" name="terms" required></label>
      </div>
    </fieldset>
    <fieldset>
      <legend>Registration</legend>

      <div class="field">
          <label>E-mail: <input type="email" name="email" placeholder="email@example.com" data-qa="field-placeholder" autocomplete="off"></label>
      </div>

      <div class="field">
          <label>Password <input type="password" name="password"></label>
      </div>
    </fieldset>

    <fieldset>
      <legend>An interesting fact about you!</legend>
      <div class="field">
        Do you love cats?
        <label><input type="radio" name="cats"> Yes</label>
        <label><input type="radio" name="cats"> No</label>
      </div>
      <div class="field">
        <label>What is your favorite color? <input type="color" name="color"></label><br>
      </div>
      <div class="field">
        <label>What time do you go to bed? <input type="time" name="time"></label><br>
      </div>
      <div class="field">
        <label>
          What your favorite brand of cars?
          <select multiple name="cars">
            <option value="BMW">BMW</option>
            <option value="Audi">Audi</option>
            <option value="Lada">Lada</option>
            <option value=""></option>
          </select>
        </label>
      </div>

      <div class="field">
        <label>How do you rate our work? <input type="range" name="rating"></label>
      </div>
    </fieldset>
    <fieldset>
      <legend>Additional info:</legend>
      <div class="field">
        <label>Comments: <textarea name="comments" autocomplete="off"></textarea></label>
      </div>
      <div class="field">
        <label>
          Would you recommend us?
          <select name="recommend">
            <option value="yes">yes</option>
            <option value="no">no</option>
          </select>
        </label>
      </div>
    </fieldset>

    <button type="submit">Submit</button>
  </form>

<script type="text/javascript" src="./main.js"></script>
</body>
</html>
