<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>HTML Form</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <form action="https://mate-academy-form-lesson.herokuapp.com/create-application" target="_blank" method="GET">
    <fieldset class="wrapper-fieldset">
      <legend>
        Personal information
      </legend>
      <label>
        Surname:
        <input type="text" name="surname" id="surname" class="form-inputs">
        <br>
      </label>
      <label>Name:
        <input type="text" name="name" id="name" class="form-inputs">
      </label>
      <br>
      <label>How old are You?
        <input type="number" name="age" id="age" value="12" maxlength="3" min="1" max="100" class="form-inputs">
      </label>
      <br>
      <label>Full date of birth:
        <input type="date" name="fullAge" id="fullAge" min="2000-01-02" max="1960-01-02" class="form-inputs">
      </label>
      <br>
      <label>I accept the term of the agreement
        <input type="checkbox" name="agreement" id="agreement" value="agree">
        <br>
      </label>
    </fieldset>
    <fieldset class="wrapper-fieldset">
      <legend>Registration</legend>
      <label>E-mail:
        <input type="email" name="email" id="email" placeholder="email@example.com" required class="form-inputs">
        <br>
      </label>
      <label>
        Password:
        <input type="password" name="password" id="password" maxlength="10">
      </label>
    </fieldset>
    <fieldset class="wrapper-fieldset">
      <legend>An interesting fact about you!</legend>
      Do you love cats?
      <label><input type="radio" name="catsLike" id="yes" value="yes"> Yes</label>
      <label><input type="radio" name="catsLike" id="no" value="no"> No</label>
      <br>
      <label>What is your favorite color?
        <input type="color" name="color" id="color" class="form-inputs">
      </label>
      <br>
      <label>
        What time do you go to bed?
        <input type="time" name="goToBed" id="goToBed" class="form-inputs">
      </label>
      <br>
      <label>What are your favorite brand of cars?
        <select name="cars" id="cars" size="4" multiple>
          <option value="bmw">BMW</option>
          <option value="audi">Audi</option>
          <option value="lada">Lada</option>
          <option value=""></option>
        </select>
      </label>
      <br>
      <label>How do you rate our work?
        <input type="range" name="rateWork" id="rateWork" min="0" max="10" step="10">
      </label>
      </div>
    </fieldset>
    <fieldset class="wrapper-fieldset">
      <legend>Additional info:</legend>
      <div class="form-inputs">
        <label>Comments:
          <textarea name="comments" id="comments" cols="20" rows="2"></textarea>
        </label>
      </div>
      <label>Would you recommend us?
        <select name="recommend" id="recommend">
          <option value="yes">yes</option>
          <option value="no">no</option>
        </select>
      </label>
    </fieldset>
    <input type="submit" value="Submit" onsubmit="onSubmit()">
  </form>
  <script type="text/javascript" src="./main.js"></script>
</body>

</html>
