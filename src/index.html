<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width,
          user-scalable=no,
          initial-scale=1.0,
          maximum-scale=1.0,
          minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
<form action="https://mate-academy-form-lesson.herokuapp.com/create-application">
  <fieldset>
    <legend>Personal information</legend>
    <label for="Surname">
      <br>Surname:
      <input type="text" name="Surname" id="Surname" autocomplete="off">
    </label>
    <label for="Name">
      <br>Name:
      <input type="text" name="Name" id="Name" autocomplete="off">
    </label>
    <label for="Year">
      <br>How old are You?
      <input type="number" name="Year" id="Year" value="12" min="1" max="140" data-qa="field-value">
    </label>
    <label for="date-of-birth">
      <br>Full date of birth:
      <input type="date" name="date-of-birth" id="date-of-birth">
    </label>
    <label for="accept-term">
      <br>I accept the term of the agreement
      <input type="checkbox" name="accept-term" id="accept-term">
    </label>
  </fieldset>
  <fieldset>
    <legend>Registration</legend>
    <label for="Email">
      E-mail:
      <input type="email" name="Email" id="Email" value="email@example.com" data-qa="field-placeholder">
    </label>
    <label for="password">
      Password:
      <input type="password" name="password" id="password">
    </label>
  </fieldset>
  <fieldset>
    <legend>An interesting fact about you!</legend>
    <label>
      Do you love cats?
      <input type="radio" name="cats-love">
      Yes
      <input type="radio" name="cats-love">
      No
    </label>
    <label for="favorite-color">
      What is your favorite color?
      <input type="color" name="favorite-color" id="favorite-color">
    </label>
    <label for="sleep-time">
      What time do you go to bed?
      <input type="time" name="sleep-time" id="sleep-time">
    </label>
    <label for="brand-of-cats">
      What are your favorite brand of cars?
      <textarea name="brand-of-cats" id="brand-of-cats" cols="3" rows="4">BMW Audi Lada</textarea>
    </label>
    <label for="rating">
      How do you rate our work?
      <input type="range" name="rating" id="rating">
    </label>
  </fieldset>
  <fieldset>
    <legend>Additional info:</legend>
    <label for="comments">
      Comments:
      <textarea name="comments" id="comments" cols="20" rows="2"></textarea>
    </label>
    <label>
      Would you recommend us?
    <select>
      <option value="recommend">yes</option>
      <option value="recommend">no</option>
    </select>
    </label>
  </fieldset>
  <button type="submit">Submit</button>
</form>
<script type="text/javascript" src="./main.js"></script>
</body>
</html>
