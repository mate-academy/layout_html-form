<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width,
          user-scalable=no,
          initial-scale=1.0,
          maximum-scale=1.0,
          minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <form action="https://mate-academy-form-lesson.herokuapp.com/create-application" onsubmit="onSubmit(event)">
    <fieldset>
      <legend>Personal information</legend>
      <div class="field">
        <label for="surname">
          Surname:
          <input type="text" name="surname" id="surname" autocomplete="off" required>
        </label>
      </div>
      <div class="field">
        <label for="name">
          Name:
          <input type="text" name="name" id="name" autocomplete="off" required>
        </label>
      </div>
      <div class="field">
        <label for="age">
          How old are You?
          <input type="number" name="age" id="age" value="12" min="1" max="100" data-qa="field-value">
        </label>
      </div>
      <div class="field">
        <label for="birth">
          Full date of birth:
          <input type="date" name="birth" id="birth">
        </label>
      </div>
      <div class="field">
        <label for="agreement">
          I accept the term of the agreement
          <input type="checkbox" name="agreement" id="agreement" required>
        </label>
      </div>
    </fieldset>
    <fieldset>
      <legend>Registration</legend>
      <div class="field">
        <label for="email">
          E-mail:
          <input type="text" name="email" id="email" placeholder="email@example.com" autocomplete="off" data-qa="field-placeholder" required>
        </label>
      </div>
      <div class="field">
        <label for="password">
          Password:
          <input type="text" name="password" id="password" autocomplete="off" required>
        </label>
      </div>
    </fieldset>
    <fieldset>
      <legend>An interesting fact about you!</legend>
      <div class="field">
        Do you love cats?
        <label for="love-cats">
          <input type="radio" name="love-cats" id="love-cats" value="yes">
          Yes
          <input type="radio" name="love-cats" id="no-cats" value="no">
          No
        </label>
      </div>
      <div class="field">
        <label for="fav-color">
          What is your favorite color?
          <input type="color" name="fav-color" id="fav-color">
        </label>
      </div>
      <div class="field">
        <label for="time-to-sleep">
          What time do you go to bed?
          <input type="time" name="time-to-sleep" id="time-to-sleep">
        </label>
      </div>
      <div class="field">
        <label for="fav-car">
          What are your favorite brands of car?
          <select name="fav-car" id="fav-car" multiple>
            <option value="BMW">BMW</option>
            <option value="Audi">Audi</option>
            <option value="Lada">Lada</option>
          </select>
        </label>
      </div>
      <div class="field">
        <label for="rate-work">
          How do you rate our work?
          <input type="range" name="rate-work" id="rate-work">
        </label>
      </div>
    </fieldset>
    <fieldset>
      <legend>Additional info:</legend>
      <div class="field">
        <label for="comments">
          Comments:
          <textarea name="comments" id="comments" minlength="10" maxlength="300"></textarea>
        </label>
      </div>
      <div class="field">
        <label for="recommend-us">
          Would you recommend us?
          <select name="recommend-us" id="recommend-us">
            <option value="yes">Yes</option>
            <option value="no">No</option>
          </select>
        </label>
      </div>
    </fieldset>
    <button type="submit">Submit</button>
  </form>
<script type="text/javascript" src="./main.js"></script>
</body>
</html>
