<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>HTML Form</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <form
      action="https://mate-academy-form-lesson.herokuapp.com/create-application">

      <!--                                                    Personal information-->

      <fieldset class="container">
        <legend>Personal information</legend>
        <label class="label" for="surname">
          Surname:
          <input
            autocomplete="off"
            class="input"
            id="surname"
            type="text"
            name="surname"
            required
          >
        </label>

        <label for="name" class="label">
          Name:
          <input
            autocomplete="off"
            class="input"
            type="text"
            name="name"
            id="name"
            required
          >
        </label>

        <label for="old" class="label">
          How old are You?
          <input
            autocomplete="off"
            class="input"
            type="number"
            name="old"
            id="old"
            value="12"
            max="100"
            min="6"
          >
        </label>

        <label for="birth" class="label">
          Full date of birth:
          <input
            autocomplete="off"
            class="input"
            type="date"
            name="birth"
            id="birth"
          >
        </label>

        <label for="term" class="label">
          I accept the term of the agreement
          <input
            autocomplete="off"
            class="input"
            type="checkbox"
            name="term"
            id="term"
          >
        </label>
      </fieldset>

      <!--                                                                Reg-->

      <fieldset class="container">
        <legend>Registration</legend>

        <label for="email" class="label">
          E-mail:
          <input
            autocomplete="off"
            type="email"
            class="input"
            name="email"
            id="email"
            placeholder="email@example.com"
            required
          >
        </label>

        <label for="password" class="label">
          Password:
          <input
            autocomplete="off"
            type="password"
            class="input"
            name="password"
            id="password"
            minlength="6"
            required
          >
        </label>
      </fieldset>


      <!--                                                  interesting fact-->

      <fieldset class="container">
        <legend>An interesting fact about you</legend>

        <label for="cat1" class="label">
          Do you love cats?
          <input
            autocomplete="off"
            type="radio"
            class="input"
            id="cat1"
            name="cat"
            value="yes"
          >
          Yes
          <input
            autocomplete="off"
            type="radio"
            class="input"
            name="cat"
            value="no"
          >
          No
        </label>

        <label for="color" class="label">
          What is your favorite color?
          <input
            autocomplete="off"
            type="color"
            class="input"
            id="color"
            name="color"
          >
        </label>

        <label for="go_bed" class="label">
          What time do you go to bed?
          <input
            autocomplete="off"
            type="time"
            class="input"
            id="go_bed"
            name="go_bed"
          >
        </label>

        <label for="car" class="label">
          What are your favorite brand of cars?
          <select
            id="car"
            class="input"
            multiple
          >
            <option name="BMW">BMW</option>
            <option name="Audi">Audi</option>
            <option name="Lada">Lada</option>
          </select>
        </label>

        <label for="rate" class="label">
          How do you rate our work?
          <input
            autocomplete="off"
            type="range"
            class="input"
            id="rate"
            name="rate"
            min="0"
            max="10"
            step="1"
            value="0"
          >
        </label>
      </fieldset>


      <!--                                                      Add info-->

      <fieldset class="container">
        <legend>Additional info:</legend>

        <label for="comment" class="label">
          Comments:
          <textarea
            name="comment"
            id="comment"
            class="input"
            maxlength="50"
         ></textarea>
        </label>

        <label for="recomend">
          Would you recommend us?
          <select
            name="recomend"
            id="recomend"
            class="input"
          >
            <option value="yes">yes</option>
            <option value="no">no</option>
          </select>
        </label>

      </fieldset>

      <button onsubmit="onSubmit()" type="submit">
        Submit
      </button>

    </form>


    <script type="text/javascript" src="./main.js"></script>
  </body>
</html>
