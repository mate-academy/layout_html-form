<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>HTML Form</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <form
    autocomplete="off"
    action="https://mate-academy-form-lesson.herokuapp.com/create-application"
    onsubmit="onSubmit()"
    method="POST"
    >
      <fieldset class="block">
        <legend>Personal information</legend>
        <div class="box">
          <label for="field-surname">Surname:</label>
          <input
            type="text"
            name="surname"
            id="field-surname"
          >
        </div>
        <div class="box">
          <label for="field-name">Name:</label>
          <input
            type="text"
            name="name"
            id="field-name"
          >
        </div>
        <div class="box">
          <label for="field-number">How old are You?</label>
          <input
            type="number"
            name="number"
            value="12"
            min="10"
            max="100"
            id="field-number"
          >
        </div>
        <div class="box">
          <label for="field-date">Full date of birth:</label>
          <input
            type="date"
            name="trip-start"
            id="field-date"
          >
        </div>
        <div>
          <label for="check-mark">I accept the term of the agreement</label>
          <input
            type="checkbox"
            name="mark"
            id="check-mark"
            required
          >
        </div>
      </fieldset>
      <fieldset class="block">
        <legend>Registration</legend>
        <div class="box">
          <label for="field-email">E-mail:</label>
          <input
            type="email"
            name="email"
            placeholder="email@example.com"
            id="field-email"
          >
        </div>
        <div>
          <label for="field-pass">Password:</label>
          <input
            type="password"
            name="password"
            minlength="5"
            maxlength="20"
            id="field-pass"
          >
        </div>
      </fieldset>
      <fieldset class="block">
        <legend>An interesting fact about you!</legend>
        <div class="box">
          Do you love cats?
          <input
            type="radio"
            name="choose"
            value="y"
            id="choose1"
          >
          <label for="choose1">Yes</label>
          <input
            type="radio"
            name="choose"
            value="n"
            id="choose2"
          >
          <label for="choose2">No</label>
        </div>
        <div class="box">
          <label for="color">What is your favorite color?</label>
          <input
            type="color"
            name="color"
            id="color"
          >
        </div>
        <div class="box">
          <label for="appt">What time do you go to bed?</label>
          <input
            type="time"
            name="appt"
            id="appt"
            step="1"
          >
        </div>
        <div class="box">
          <label for="field-brand">What are your favorite brand of cars?</label>
          <select
            name="brand"
            id="field-brand"
            multiple
          >
            <option value="car-bmw">BMW</option>
            <option value="car-audi">Audi</option>
            <option value="car-lada">Lada</option>
          </select>
        </div>
        <div>
          <label for="range">How dou rate our work?</label>
          <input
            type="range"
            name="rate"
            id="range"
            value="0"
            min="0"
            max="5"
          >
        </div>
      </fieldset>
      <fieldset>
        <legend>Additional info:</legend>
        <div class="box">
          <label for="field-comments">Comments:</label>
          <textarea
            name="comments"
            id="field-comments"
            rows="2"
            cols="20"
          >
          </textarea>
        </div>
        <div>
          <label for="field-recommendation">Would you  recommend us?</label>
          <select
            name="recommendation"
            id="field-recommendation"
          >
            <option value="yes">yes</option>
            <option value="no">no</option>
          </select>
        </div>
      </fieldset>
      <button type="submit">Submit</button>
    </form>
    <script type="text/javascript" src="./main.js"></script>
  </body>
</html>
