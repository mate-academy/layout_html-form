<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width,
          user-scalable=no,
          initial-scale=1.0,
          maximum-scale=1.0,
          minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
<form action="https://mate-academy-form-lesson.herokuapp.com/create-application" onsubmit="onSubmit(event)">
  <fieldset>
    <legend>Personal information</legend>
    <label>
      Surname:
      <input type="text" name="Surname" autocomplete="off">
    </label>
    <label>
      Name:
      <input type="text" name="Name" autocomplete="off">
    </label>
    <label>
      How old are You?
      <input type="number" name="Year" value="12" min="1" max="140" data-qa="field-value">
    </label>
    <label>
      Full date of birth:
      <input type="date" name="date-of-birth">
    </label>
    <label>
      I accept the term of the agreement
      <input type="checkbox" name="accept-term">
    </label>
  </fieldset>
  <fieldset>
    <legend>Registration</legend>
    <label>
      E-mail:
      <input type="email" name="Email" placeholder="email@example.com" data-qa="field-placeholder">
    </label>
    <label>
      Password:
      <input type="password" name="password">
    </label>
  </fieldset>
  <fieldset>
    <legend>An interesting fact about you!</legend>
    Do you love cats?
    <label class="radio-inline"><input type="radio" name="cats-love">Yes</label>
    <label class="radio-inline"><input type="radio" name="cats-love">No</label>
    <label>
      What is your favorite color?
      <input type="color" name="favorite-color">
    </label>
    <label>
      What time do you go to bed?
      <input type="time" name="sleep-time" step="2">
    </label>
    <label>
      What are your favorite brand of cars?
      <select name="cars" size="4">
        <option>BMW</option>
        <option>Audi</option>
        <option>Lada</option>
      </select>
    </label>
    <label>
      How do you rate our work?
      <input type="range" name="rating">
    </label>
  </fieldset>
  <fieldset>
    <legend>Additional info:</legend>
    <label>
      Comments:
      <textarea name="comments" cols="20" rows="2"></textarea>
    </label>
    <label>
      Would you recommend us?
    <select name="recomend">
      <option value="recommend">yes</option>
      <option value="recommend">no</option>
    </select>
    </label>
  </fieldset>
  <button type="submit">Submit</button>
</form>
<script type="text/javascript" src="./main.js"></script>
</body>
</html>
