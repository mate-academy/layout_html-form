<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>HTML Form</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <form action="https://mate-academy-form-lesson.herokuapp.com/create-application" method="POST">
    <fieldset class="main-block">
      <legend>Personal information</legend>
      <label class="sub-block">Surname:
        <input type="text" name="surname" autocomplete="off" minlength="2" maxlength="30" required>
      </label>
      <label class="sub-block">Name:
        <input type="text" name="name" minlength="2" maxlength="30" autocomplete="off" required>
      </label>
      <label class="sub-block">How old are You?
        <input type="number" name="age" value="12" min="12" max="100">
      </label>
      <label class="sub-block">Full date of birth:
        <input type="date" name="birth-date" required>
      </label>
      <label class="sub-block">I accept the term of the agreement
        <input type="checkbox" name="agreement" required>
      </label>
    </fieldset>
    <fieldset class="main-block">
      <legend>Registration</legend>
      <label class="sub-block">E-mail:
        <input type="email" name="email" placeholder="email@example.com">
      </label>
      <label class="sub-block">Password:
        <input type="password" name="password" minlength="8" maxlength="18">
      </label>
    </fieldset>
    <fieldset class="main-block">
      <legend>An interesting fact about you!</legend>
      <div class="sub-block">
        Do you love cats?
        <label for="Yes">
          <input type="radio" name="answer" id="Yes">Yes
        </label>
        <label for="No">
          <input type="radio" name="answer" id="No">No
        </label>
      </div>
      <label class="sub-block">What is your favorite color?
        <input type="color" name="color" multiple>
      </label>
      <label class="sub-block">What time do you go to bed?
        <input type="time" name="sleep-time">
      </label>
      <label class="sub-block" for="favorite-brand-of-car">What are your favorite brand of cars?
        <select name="favorite-car" id="favorite-brand-of-car" multiple>
          <option value="bmw">BMW</option>
          <option value="audi">Audi</option>
          <option value="lada">Lada</option>
        </select>
      </label>
      <label class="sub-block">How do you rate our work?
        <input type="range" name="rate-of-work">
      </label>
    </fieldset>
    <fieldset class="main-block">
      <legend>Additional info</legend>
      <label class="sub-block">Comments:
        <textarea name="comment"></textarea>
      </label>
      <label class="sub-block">Would you recommend us?
        <select name="recommend">
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>
      </label>
    </fieldset>
    <button type="submit" onsubmit="onSubmit()" class="button-submit">Submit</button>
  </form>
  <script type="text/javascript" src="./main.js"></script>
</body>
</html>
