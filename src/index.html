<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width,
          user-scalable=no,
          initial-scale=1.0,
          maximum-scale=1.0,
          minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <form action="https://mate-academy-form-lesson.herokuapp.com/create-application" method="post" autocomplete="off">
    <fieldset>
      <legend>Personal information</legend>
      <label for="surname">Surname:
        <input type="text" name="surname" id="surname" autocomplete="off">
      </label>
      <label for="name">Name:
        <input type="text" name="name" id="name" autocomplete="off">
      </label>
      <label for="years">How old are You?
        <input type="number" name="years" id="years" value="12" data-qa="field-value" min="10" max="100">
      </label>
      <label for="birth">Full date of birth:
        <input type="date" name="birth" id="birth">
      </label>
      <label for="agreement" class="no-margin">I accept the term of the agreement
        <input type="checkbox" name="agreement" id="agreement">
      </label>
    </fieldset>

    <fieldset>
      <legend>Registration</legend>
      <label for="email">E-mail:
        <input type="email" name="email" id="email" placeholder="email@example.com" data-qa="field-placeholder">
      </label>
      <label for="password" class="no-margin">Password:
        <input type="password" name="password" id="password" minlength="8" maxlength="64">
      </label>
    </fieldset>

    <fieldset>
      <legend>An interesting fact about you!</legend>
      <label for="cats">Do you love cats?
        <input type="radio" name="cats" id="cats">Yes
        <input type="radio" name="cats" id="">No
      </label>
      <label for="color">What is your favorite color?
        <input type="color" name="color" id="color">
      </label>
      <label for="bedTime">What time do you go to bed?
        <input type="time" name="bedTime" id="bedTime" step="5">
      </label>
      <label for="cars">What are your favorite brand of cars?
        <select name="cars" id="cars" size="4">
          <option value="BMW">BMW</option>
          <option value="Audi">Audi</option>
          <option value="Lada">Lada</option>
        </select>
      </label>
      <label for="rating" class="no-margin">How do you rate our work?
        <input type="range" name="rating" id="rating" step="2" min="0" max="10" value="0">
      </label>
    </fieldset>

    <fieldset>
      <legend>Additional info:</legend>
      <label for="comment">Comments:
        <textarea name="comment" id="comment" cols="20" rows="2"></textarea>
      </label>
      <label for="recommend" class="no-margin">Would you recommend us?
        <select name="recommend" id="recommend">
          <option value="yes" selected>yes</option>
          <option value="no">no</option>
        </select>
      </label>
    </fieldset>

    <input type="submit" value="Submit">
  </form>
<script type="text/javascript" src="./main.js"></script>
</body>
</html>
