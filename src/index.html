<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    >
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>HTML Form</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <form
      action="https://mate-academy-form-lesson.herokuapp.com/create-application"
      method="GET"
      onsubmit="onSubmit()"
    >
      <fieldset>
        <legend>Personal information</legend>
        <label for="surname" class="form-field">
          Surname:
          <input
            id="surname"
            type="text"
            name="surname"
            required
          >
        </label>

        <label for="name" class="form-field">
          Name:
          <input
            id="name"
            type="text"
            name="name"
            required
          >
        </label>

        <label for="age" class="form-field">
          How old are you:
          <input
            id="age"
            type="number"
            name="age"
            value="12"
            min="12"
            max="100"
            required
          >
        </label>

        <label for="date" class="form-field">
          Full date of birth:
          <input
            id="date"
            type="date"
            name="date"
            required
          >
        </label>

        <label for="remember" class="form-field">
          I accept the term of the agreement:
          <input
            id="remember"
            type="checkbox"
            name="remember"
            required
          >
        </label>
      </fieldset>

      <fieldset>
        <legend>Registration</legend>
        <label for="email" class="form-field">
          E-mail:
          <input
            id="email"
            type="text"
            name="email"
            placeholder="email@example.com"
            required
          >
        </label>

        <label for="password" class="form-field">
          Password:
          <input
            id="password"
            type="text"
            name="password"
            minlength="8"
            maxlength="18"
            required
          >
        </label>
      </fieldset>

      <fieldset>
        <legend>An interesting fact about you!</legend>
        <div class="form-field">
          <label for="cats_yes">
            Do you love cats?
            <input
              id="cats_yes"
              type="radio"
              name="cats"
              value="yes"
            >
              Yes
          </label>

          <label for="cats_no">
            <input
              id="cats_no"
              type="radio"
              name="cats"
              value="not"
            >
              No
          </label>
        </div>

        <label for="color" class="form-field">
          What is your favorite color?
          <input
            id="color"
            type="color"
            name="color"
          >
        </label>

        <label for="time" class="form-field">
          What is your favorite color?
          <input
            id="time"
            type="time"
            name="time"
          >
        </label>

        <label for="favorite-car" class="form-field">
          What are your favorite cars?
          <select
            id="favorite-car"
            name="favorite-car"
            multiple
          >
            <option value="BMW">BMW</option>
            <option value="Audi">Audi</option>
            <option value="Lada">Lada</option>
          </select>
        </label>

        <label for="rate" class="form-field">
          How do you rate our work?
          <input
            id="rate"
            type="range"
            name="rate"
          >
        </label>
      </fieldset>

      <fieldset>
        <legend>Additional info:</legend>
        <label for="comments" class="form-field">
          Comments:
          <textarea
            id="comments"
            name="comments"
          >
          </textarea>
        </label>

        <label for="recommend" class="form-field">
          Would you recommends us?
          <select name="recommend" id="recommend">
            <option value="yes">yes</option>
            <option value="no">no</option>
          </select>
        </label>
      </fieldset>

      <button type="submit" class="">Submit</button>

    </form>
    <script type="text/javascript" src="./main.js"></script>
  </body>
</html>
