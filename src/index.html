<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>HTML Form</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <form action="https://mate-academy-form-lesson.herokuapp.com/create-application" target="_blank" method="GET">
    <fieldset class="wrapperFieldset">
      <legend>
        Personal information
      </legend>
      <label for="surname">
        Surname:
        <input type="text" name="surname" id="surname" class="form-inputs">
        <br>
      </label>
      <label for="name">Name:</label>
      <input type="text" name="name" id="name" class="form-inputs">
      <br>
      <label for="age">How old are You?</label>
      <input type="number" name="age" id="age" value="12" maxlength="3" min="1" max="100" class="form-inputs">
      <br>
      <label for="fullAge">Full date of birth:</label>
      <input type="date" name="fullAge" id="fullAge" min="2000-01-02" max="1960-01-02" class="form-inputs">
      <br>
      <label for="agreement">I accept the term of the agreement</label>
      <input type="checkbox" name="agreement" id="agreement" value="agree"> <br>
    </fieldset>
    <fieldset class="wrapperFieldset">
      <legend>Registration</legend>
      <label for="email">E-mail:</label>
      <input type="email" name="email" id="email" placeholder="email@example.com" required class="form-inputs">
      <br>
      <label for="password">Password:</label>
      <input type="password" name="password" id="password" maxlength="10">
    </fieldset>
    <fieldset class="wrapperFieldset">
      <legend>An interesting fact about you!</legend>
      Do you love cats?
      <label for="yes"><input type="radio" name="catsLike" id="yes" value="yes"> Yes</label>
      <label for="no"><input type="radio" name="catsLike" id="no" value="no"> No</label>
      <br>
      <label for="color">What is your favorite color?</label>
      <input type="color" name="color" id="color" class="form-inputs">
      <br>
      <label for="goToBed">What time do you go to bed?</label>
      <input type="time" name="goToBed" id="goToBed" class="form-inputs">
      <br>
      <label for="cars">What are your favorite brand of cars?</label>
      <select name="cars" id="cars" size="4" multiple>
        <option value="bmw">BMW</option>
        <option value="audi">Audi</option>
        <option value="lada">Lada</option>
        <option value=""></option>
      </select>
      <br>
      <label for="rateWork">How do you rate our work?</label>
      <input type="range" name="rateWork" id="rateWork" min="0" max="10" step="10">
    </div>
    </fieldset>
    <fieldset class="wrapperFieldset">
      <legend>Additional info:</legend>
      <div class="form-inputs">
        <label for="comments">Comments:</label>
        <textarea name="comments" id="comments" cols="20" rows="2"></textarea>
      </div>
      <label for="recommend">Would you recommend us?</label>
      <select name="recommend" id="recommend">
        <option value="yes">yes</option>
        <option value="no">no</option>
      </select>
    </fieldset>
    <input type="submit" value="Submit" onsubmit="onSubmit()">
  </form>
  <script type="text/javascript" src="./main.js"></script>
</body>

</html>
