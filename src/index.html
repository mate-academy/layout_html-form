<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width,
          user-scalable=no,
          initial-scale=1.0,
          maximum-scale=1.0,
          minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
<form action="https://mate-academy-form-lesson.herokuapp.com/create-application" method="POST">
  <fieldset>
    <legend>Personal information</legend>
    <label>
      Surname:
      <input type="text" name="Surname">
    </label>
    <label>
      Name:
      <input type="text" name="Name">
    </label>
    <label>
      How old are You?
      <input type="number" name="age" id="age" value="12" data-qa="field-value">
    </label>
    <label>
      Full date of birth:
      <input type="date" name="birth">
    </label>
    <label>
      I accept the term of the agreement
      <input type="checkbox" name="accept" value="accept">
    </label>
  </fieldset>
  <fieldset>
    <legend>Registration</legend>
    <label>
      E-mail:
      <input type="email" name="email" placeholder="email@example.com" data-qa="field-placeholder">
  </label>
  <label>
    Password:
    <input type="password">
  </label>
  </fieldset>
  <fieldset>
    <legend>An interesting fact about you!</legend>
    <label>
      Do you love cats?
      <input type="radio" name="yes" id="yes">
      Yes
      <input type="radio" name="no" id="no">
      No
    </label>
    <label>
      What is your favorite color?
      <input type="color" name="color" id="color">
    </label>
    <label>
      What time do you go to bed?
      <input type="time" name="time" id="time">
    </label>
    <label>
      What are your favorite brand of cars?
      <select name="cars" size="4" multiple>
          <option value="BMW">BMW</option>
          <option value="Audi">Audi</option>
          <option value="Lada">Lada</option>
      </select>
    </label>
    <label>
      How do you rate our work?
      <input type="range" name="range" id="range">
    </label>
  </fieldset>
  <fieldset>
    <legend>Additional info:</legend>
    <label>
      Comments:
      <textarea name="comment" cols="20" rows="2"></textarea>
    </label>
    <label>
      Would you recomend us?
      <select name="recomendation" id="recomendation">
        <option value="yes">Yes</option>
        <option value="no">No</option>
      </select>
    </label>
  </fieldset>
  <input type="submit" value="Submit">
</form>
<script type="text/javascript" src="./main.js"></script>
</body>
</html>
