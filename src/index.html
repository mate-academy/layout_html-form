<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>HTML Form</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>

  <h1>HTML Form</h1>
  <script type="text/javascript" src="./main.js"></script>

  <form action="">

    <fieldset>
      <legend>Personal information</legend>
      <div>
        <label>
          Surname:
          <input type="text">
        </label>
      </div>
      <div>
        <label>
          How old are you?
          <input type="text">
        </label>
      </div>
      <div>
        <label>
          Full date of birth:
          <input type="text">
        </label>
      </div>
      <div>
        <label>
          I accept the term of the agreement
          <input type="checkbox">
        </label>
      </div>
    </fieldset>

    <fieldset>
      <legend>Registration</legend>
      <div>
        <label>
          E-mail:
          <input type="email">
        </label>
      </div>
      <div>
        <label>
          Password:
          <input type="password">
        </label>
      </div>
    </fieldset>

    <fieldset>
      <legend>An interesting fact about you</legend>
      <div>
        Do you love cats?
        <label>
          <input type="radio" name="doYouLoveCats" value="yes">
          Yes
        </label>
        <label>
          <input type="radio" name="doYouLoveCats" value="no">
          No
        </label>
      </div>

      <div>
        <label>
          What is your favorite color?
          <input type="color">
        </label>
      </div>
      
      <div>
        <label>
          What time do you go to bed?
          <input type="time">
        </label>
      </div>

      <div>
        <label>
          What is your favorite brand of cars?
          <select name="brandOfCars" multiple>
            <option value="BMW">BMW</option>
            <option value="Audi">Audi</option>
            <option value="Lada">Lada</option>
          </select>
        </label>
      </div>
      
      <div>
        <label>
          How do you rate your work?
          <input type="range" min = "0" max="100" step="1" value="0">
        </label>
      </div>

    </fieldset>

    <fieldset>
      <legend>Additional info</legend>
      <div>
        Comments:
        <textarea name="comments" id="" cols="30" rows="5"></textarea>
      </div>
      <div><label for="">
        Would you recommend us?
        <input type="" name="" id="">

      </label></div>
    </fieldset>

  </form>

</body>

</html>
