<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>HTML Form</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <script type="text/javascript" src="./main.js"></script>
  <form action="https://mate-academy-form-lesson.herokuapp.com/create-application" method="POST">
    <fieldset class="block"><legend>Personal information</legend>
      <label class="block-input"> Surname:
        <input type ="text" name="surname">
      </label>
      <label class="block-input">Name:
        <input type="text" name="name">
      </label>
      <label class="block-input">How old are You?
        <input type="number" value="12" name="age" id="age" min="1" max="102">
      </label>
      <label class="block-input">Full date of birth:
        <input type="date" name="birthdate">
      </label>
      <label for="agreement" class="block-input">I accept the term of the agreement
        <input type="checkbox" name="agreement" id="agreement">
      </label>
    </fieldset>
    <fieldset class="block">
      <legend>Registration</legend>
      <label class="block-input">E-mail:
        <input type="email" name="email" placeholder="email@example.com" minlength="6" maxlength="64">
      </label>
      <label class="block-input">Password:
        <input type="password" name="password" autocomplete="off">
      </label>
    </fieldset>
    <fieldset class="block">
      <legend>An interesting fact about you!</legend>
      <div class="block-input">Do you love cats?
        <label for="yes">
          <input type="radio" name="catlover" value="yes" id="yes"><span> Yes</span>
        </label>
        <label for="no">
          <input type="radio" name="catlover" value="no" id="no"><span> No</span>
        </label>
      </div>
      <label class="block-input">What is your favorite color?
        <input type="color" value="#000" name="favcolor">
      </label>
      <label class="block-input">What time do you go to bed?
        <input type="time" name="timetobed" id="timetobed">
      </label>
      <label class="block-input">What are your favorite brand of cars?
        <select name="car" multiple>
          <option value="bmw">BMW</option>
          <option value="audi">Audi</option>
          <option value="lada">Lada</option>
        </select>
      </label>
      <label class="block-input">How do you rate our work?
        <input type="range" value="0" name="rate">
      </label>
    </fieldset>
    <fieldset class="block">
      <legend>Additional info:</legend>
      <label class="block-input">
        Comments: <textarea name="comments" rows="2"></textarea>
      </label>
      <label class="block-input">Would you recommend us?
        <select name="recommend">
          <option value="yes" selected>yes</option>
          </select>
      </label>
    </fieldset class="block">
    <button type="submit" onsubmit="onSubmit()">Submit</button>
  </form>
  </body>
</html>
