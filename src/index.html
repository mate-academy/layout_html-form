<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width,
          user-scalable=no,
          initial-scale=1.0,
          maximum-scale=1.0,
          minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <form action="/login" method="post">
    <fieldset>
      <legend>
        Personal information
      </legend>
      <label for="surname">
        Surname:
        <input type="text" name="surname" id="surname" minlength="3" maxlength="20" autocomplete="off" required>
      </label>
      <label for="name">
        Name:
        <input type="text" name="name" id="name" maxlength="20" autocomplete="off" required>
      </label>
      <label for="age">
        How old are You?
        <input type="number" min="12" max="100" value="12" name="age" id="age" data-qa="field-value">
      </label>
      <label for="date">
        Full date of birth:
        <input type="date" name="date" id="date" placeholder="mm/ dd/yyy" required>
      </label>
      <label for="accept">
        I accept the term ofthe agreement
        <input type="checkbox" name="accept" id="accept" required>
      </label>
    </fieldset>

    <fieldset>
      <legend>
        Registration
      </legend>

      <label for="email-address">
        E-mail:
        <input type="email" name="email-address" id="email-address" placeholder="email@example.com" data-qa="field-placeholder" required>
      </label>
      <label for="password">
        Password
        <input type="password" name="password" id="password" autocomplete="off" required>
      </label>
    </fieldset>

    <fieldset>
      <legend>
        An interesting fact about you!
      </legend>

      <label for="love-query">
        Do you love cats?
        <input type="radio" name="love-query" id="love-query" value="yes">Yes
        <input type="radio" name="love-query" value="no">No
      </label>
      <label for="color">
        What is your favorite color?
        <input type="color" name="color" id="color">
      </label>
      <label for="bed-time">
        What time do you go to bed?
        <input type="time" name="bed-time" id="bed-time">
      </label>
      <label  for="car_brands">What are your favorite brand of cars?
        <select name="car_brands" id="car_brands" size="4">
          <option value="BMW">BMW</option>
          <option value="Audi">Audi</option>
          <option value="Lada">Lada</option>
        </select>
      </label>
      <label for="rating">
        How do you rate our work?
        <input type="range" name="rating" id="rating" required>
      </label>
    </fieldset>

    <fieldset>
      <legend>
        Addition info
      </legend>

      <label for="comments">
        Comments:
        <textarea cols="20" rows="2" id="comments" name="comments"></textarea>
      </label>
      <label for="recomendation">
        Would you recommend us?
        <select name="recomendation" id="recomendation">
          <option value="yes">yes</option>
          <option value="no">no</option>
        </select>
      </label>
    </fieldset>
    <input type="submit" value="Submit" name="submit">
  </form>

<script type="text/javascript" src="./main.js"></script>
</body>
</html>
