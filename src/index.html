<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>HTML Form</title>
    <link rel="stylesheet" href="./style.css">
  </head>

  <body>
    <form
    action="https://mate-academy-form-lesson.herokuapp.com/create-application"
    method="post"
    onsubmit="onSubmit()">
      <fieldset>
        <legend>Personal information</legend>

        <div class="form-field">
          <label for="surname">Surname:</label>
          <input
            type="text"
            id="surname"
            name="surname"
          >
        </div>

        <div class="form-field">
          <label for="name">Name:</label>
          <input
            type="text"
            id="name"
            name="name"
            required
          >
        </div>

        <div class="form-field">
          <label for="age">How old are You?</label>
          <input
            type="number"
            id="age"
            name="age"
            value="12"
            min="12"
            max="100"
            required
          >
        </div>

        <div class="form-field">
          <label for="birthDay">Full date of birth:</label>
          <input
            type="date"
            name="dateOfBirth"
            id="birthDay"
            required
          >
        </div>

        <div class="form-field">
          <label for="agreement">I accept the term of the agreement</label>
          <input
            type="checkbox"
            name="agreement"
            id="agreement"
            required
          >
        </div>

      </fieldset>


      <fieldset>
        <legend>Registration</legend>

        <div class="form-field">
          <label for="email">E-mail:</label>
          <input
            type="email"
            name="email"
            id="email"
            placeholder="email@example.com"
            required
          >
        </div>

        <div class="form-field">
          <label for="pass">Password:</label>
          <input
            type="password"
            name="password"
            id="pass"
            minlength="3"
            maxlength="10"
          >
        </div>

      </fieldset>


      <fieldset>
        <legend>An interesting fact about you!</legend>
        <div class="form-field">
          <label for="yes">
            Do you love cats?
            <input
              type="radio"
              name="cats"
              value="y"
              id="yes"
            >
            <label for="yes">Yes</label>

            <input
              type="radio"
              name="cats"
              value="n"
              id="no"
            >
            <label for="no">No</label>
          </label>
        </div>

        <div class="form-field">
          <label for="color">What is your favorite color?</label>
          <input
            type="color"
            name="color"
            id="color"
          >
        </div>

        <div class="form-field">
          <label for="goToBed">What time do you go to bed?</label>
          <input
            type="time"
            name="goToBed"
            id="goToBed"
          >
        </div>

        <div class="form-field">
          <label for="favoriteCar">What are your favorite brand of cars?</label>
          <select
            name="favoriteCar"
            id="favoriteCar"
            multiple
          >
            <option value="BMW">BMW</option>
            <option value="Audi">Audi</option>
            <option value="Lada">Lada</option>
            <option value="" disabled></option>
          </select>
        </div>

        <div class="form-field">
          <label for="rate">How do you rate our work?</label>
          <input
            type="range"
            name="range"
            id="rate"
            min="0"
            max="10"
            value="0"
          >
        </div>

      </fieldset>


      <fieldset>
        <legend>Additional info:</legend>
        <div class="form-field">
          <label for="comments">Comments:</label>
          <textarea
            name="comments"
            id="comments"
         ></textarea>
        </div>

        <div class="form-field">
          <label for="recommend">Would you reccomend us&</label>
          <select
            name="recommend"
            id="recommend"
          >
            <option value="yes">yes</option>
            <option value="no">no</option>
          </select>
        </div>
      </fieldset>

      <button type="submit">Submit</button>

    </form>
    <script type="text/javascript" src="./main.js"></script>
  </body>
</html>
