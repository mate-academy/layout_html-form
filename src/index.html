<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width,
          user-scalable=no,
          initial-scale=1.0,
          maximum-scale=1.0,
          minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
<form action="https://mate-academy-form-lesson.herokuapp.com/create-application" method="post">
  <fieldset>
    <legend>Personal information</legend>
    <div class="row">
      <label for="surname">Surname:</label>
      <input type="text" id="surname" name="surname" autocomplete="off" minlength="3" maxlength="20">
    </div>
    <div class="row">
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" autocomplete="off" minlength="3" maxlength="20">
    </div>
    <div class="row">
      <label for="age">How old are You?</label>
      <input type="number" id="age" name="age" data-qa="field-value" value="12">
    </div>
    <div class="row">
      <label for="date">Full date of birth:</label>
      <input type="date" id="date" name="date">
    </div>
    <div class="row">
      <label for="accept">I accept the term of the agreement</label>
      <input type="checkbox" id="accept" name="accept">
    </div>
  </fieldset>
  <fieldset>
    <legend>Registration</legend>
    <div class="row">
      <label for="email">E-mail:</label>
      <input type="email" id="email" name="email" placeholder="email@example.com" data-qa="field-placeholder">
    </div>
    <div class="row">
      <label for="password">Password:</label>
      <input type="password" id="password" name="password">
    </div>
  </fieldset>
  <fieldset>
    <legend>An interesting fact about you!</legend>
    <div class="row">
      <span>Do you love cats?</span>
      <input type="radio" id="yes" value="yes" name="yes">
      <label for="yes">Yes</label>
      <input type="radio" id="no" value="no" name="no">
      <label for="no">No</label>
    </div>
    <div class="row">
      <label for="color">What is your favourite color?</label>
      <input type="color" id="color" value="#000000" name="black-color">
    </div>
    <div class="row">
      <label for="time">What time do you go to bed?</label>
      <input type="time" id="time" name="time">
    </div>
    <div class="row">
      <label for="car-list">What are you favourite brand of cars?</label>
      <select id="car-list" name="cars" size="4">
        <option>BMW</option>
        <option>Audi</option>
        <option>Lada</option>
      </select>
    </div>
    <div class="row">
      <label for="rate-work">How do you rate our work</label>
      <input type="range" id="rate-work" min="1" max="10" name="range" value="1">
    </div>
  </fieldset>
  <fieldset>
    <div class="row">
      <label for="comments">Comments:</label>
      <textarea id="comments" rows="2"></textarea>
    </div>
    <div class="row">
      <label for="recommend">Would you recommend us?</label>
      <select id="recommend" name="recommend">
        <option>yes</option>
        <option>no</option>
      </select>
    </div>
  </fieldset>
  <button type="submit">Submit</button>
</form>
<script type="text/javascript" src="./main.js"></script>
</body>
</html>
