<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width,
          user-scalable=no,
          initial-scale=1.0,
          maximum-scale=1.0,
          minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <form action="https://mate-academy-form-lesson.herokuapp.com/create-application" autocomplete="off">

    <fieldset>
      <legend>Personal information</legend>
      <label>Surname:
        <input type="text" name="Surname">
      </label>
      <label>Name:
        <input type="text" name="Name">
      </label>
      <label>How old are You?
        <input type="number" name="number" value="12" step="1" min="0" max="200" data-qa="field-value">
      </label>
      <label>Full date of birth:
        <input type="date" name="birth">
      </label>
      <label>I accept the term of the agreement
        <input type="checkbox" name="accepting" value="accept">
      </label>
    </fieldset>

    <fieldset>
      <legend>Registration</legend>
      <label>E-mail:
        <input type="email" name="mail" placeholder="email@example.com" data-qa="field-placeholder">
      </label>
      <label>Password:
        <input type="password" name="password">
      </label>
    </fieldset>

    <fieldset>
      <legend>An interesting fact about you!</legend>
      <label>Do you love cats?
        <input type="radio" name="cats" value="yes">Yes
        <input type="radio" name="cats" value="no">No
      </label>
      <label>What is your favorite color?
        <input type="color" name="favcolor" value="black">
      </label>
      <label>What time do you go to bed?
        <input type="time" name="time" step="1">
      </label>
      <label>What are your favorite brand of cars?
        <select name="cars" multiple>
          <option value="bmw">BMW</option>
          <option value="audi">Audi</option>
          <option value="lada">Lada</option>
        </select>
      </label>
      <label>How do you rate our work?
        <input type="range" name="range" step="0" min="0" max="100" value="0">
      </label>
    </fieldset>

    <fieldset>
      <legend>Additional info:</legend>
      <label>Comments:
        <textarea name="comments" cols="20" rows="2"></textarea>
      </label>
      <label>Would you recommend us?
        <select name="select">
          <option value="yes">yes</option>
          <option value="no">no</option>
        </select>
      </label>
    </fieldset>

    <input type="Submit" name="Submit" value="Submit">
  </form>

<script type="text/javascript" src="./main.js"></script>
</body>
</html>
