<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>HTML Form</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <form action="https://mate-academy-form-lesson.herokuapp.com/create-application" class="user-form" method="POST">
    <fieldset class="form-section">
      <legend>Personal information</legend>
      <label for="user-surname">Surname:
        <input type="text" id="user-surname" name="user-surname">
      </label>
      <label for="user-name">Name:
        <input type="text" id="user-name" name="user-name">
      </label>
      <label for="user-age">How old are You?
        <input class="user-age_input" type="number" id="user-age" name="user-age" value="12" min="8" max="99">
      </label>
      <label for="user-birth">Full date of birth:
        <input type="date" id="user-birth" name="user-birth">
      </label>
      <label for="user-agreement">I accept the term of the agreement
        <input type="checkbox" id="user-agreement" name="user-agreement" class="last-input">
      </label>
    </fieldset>
    <fieldset class="form-section">
      <legend>Registration</legend>
      <label for="user-email">E-mail:
        <input type="email" id="user-email" name="user-email" placeholder="email@example.com" required>
      </label>
      <label for="user-password">Password:
        <input type="password" id="user-password" name="user-password" minlength="8" maxlength="17" class="last-input" required>
      </label>
    </fieldset>
    <fieldset class="form-section">
      <legend>An interesting fact about you!</legend>
      <label for="user-cats">Do you love cats?
        <input type="radio" id="user-cats" name="user-cats-yes">Yes
        <input type="radio" name="user-cats-no">No
      </label>
      <label for="user-color">What is your favorite color?
        <input type="color" id="user-color" name="user-color">
      </label>
      <label for="user-time">What time do you go to bed?
        <input type="time" id="user-time" name="user-time" class="user-time__button">
      </label>
      <label for="user-cars">What are your favorite brand of cars?
        <select id="user-cars" multiple>
          <option value="bmw">BMW</option>
          <option value="audi">Audi</option>
          <option value="lada">Lada</option>
        </select>
      </label>
      <label for="user-work">How do you rate our work?
        <input type="range" id="user-work" name="user-work" value="0" class="last-input">
      </label>
    </fieldset>
    <fieldset class="form-section">
      <legend>Additional info:</legend>
      <label for="user-comments">Comments:
        <textarea name="user-comments" id="user-comments" cols="20" rows="2" ></textarea>
      </label>
      <label for="user-recommend">Would you recommend us?
        <select name="user-recommend" id="user-recommend" class="last-input">
          <option value="yes">yes</option>
          <option value="no">no</option>
        </select>
      </label>
    </fieldset class="form-section">
    <input type="submit" class="submit" name="submit" onsubmit="onSubmit()">
  </form>
</body>
</html>
