<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    >
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>HTML Form</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <form
    action="https://mate-academy-form-lesson.herokuapp.com/create-application"
    onsubmit="onSubmit()"
    method="POST"
    >

      <fieldset>
        <legend>Personal information</legend>
        <label for="Surname" class="form-field">
          Surname:
          <input
            type="text"
            id="Surname"
            autocomplete="off"
            required
          >
        </label>
        <label for="Name" class="form-field">
          Name:
          <input
            type="text"
            id="Name"
            autocomplete="off"
            required
          >
        </label>
        <label for="age" class="form-field">
          How old are you?
          <input
            type="number"
            min="12"
            max="100"
            id="age"
            value="12"
            required
          >
        </label>
        <label for="birth" class="form-field">
          Full date of birth:
          <input type="date" id="birth">
        </label>
        <label for="Terms">
          I accept the term of the agreement
          <input
            type="checkbox"
            required
            id="Terms"
            checked
          >
        </label>
      </fieldset>

      <fieldset>
        <legend>Registration</legend>

        <label for="email" class="form-field">
          E-mail:
          <input
            type="email"
            id="email"
            placeholder="email@example.com"
            autocomplete="off"
            required
          >
        </label>

        <label for="password">
          Password:
          <input
            type="password"
            id="password"
            minlength="8"
            maxlength="32"
            autocomplete="off"
            required
          >
        </label>
      </fieldset>

      <fieldset>
        <legend>An interesting fact about you!</legend>
        <div class="form-field">
          Do you love cats?

          <label for="yes">
            <input
              type="radio"
              id="yes"
              name="yes_no"
            >Yes
          </label>

          <label for="no">
            <input
              type="radio"
              id="no"
              name="yes_no"
            >no
          </label>
        </div>

        <label for="color" class="form-field">
          What is your favorite color?
          <input
            type="color"
            id="color"
            value="#000"
          >
        </label>

        <label for="time_to_go_to_bed" class="form-field">
          What time do you go to bed?
          <input type="time" id="time_to_go_to_bed">
        </label>

        <label for="brand_of_cars" class="form-field">
          What are you favorite brand of cars?
          <select
            name="color"
            id="brand_of_cars"
            multiple
          >
            <option value="BMW">BMW</option>
            <option value="Audi">Audi</option>
            <option value="Lada">Lada</option>
          </select>
        </label>

        <label for="rate_of_work">
          How do you rate our work?
          <input
            type="range"
            id="rate_of_work"
            value="0"
          >
        </label>
      </fieldset>

      <fieldset>
        <legend>Additional info:</legend>
        <label for="Comments" class="form-field">
          Comments:
          <textarea name="feedmack" id="Comments"></textarea>
        </label>

        <label for="recommend">
          Would you recommend us?
          <select name="feedback" id="recommend">
            <option value="yes" selected>yes</option>
            <option value="no">no</option>
          </select>
        </label>
      </fieldset>

      <button type="submit">Submit</button>
    </form>

    <script type="text/javascript" src="./main.js"></script>
  </body>
</html>
