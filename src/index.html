<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    >
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>HTML Form</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <form action="https://mate-academy-form-lesson.herokuapp.com/create-application"
    method="POST"
    onsubmit="onSubmit()">
      <!-----------------  Area 1 ----------------------->
      <fieldset class="fieldset">
        <legend class="legend">Personal information</legend>

        <label for="" class="form-field">
          Surname:
          <input
          id=""
          type="text"
          name="Surname"
          autocomplete="off"
          required>
        </label>

        <label for="" class="form-field">
          Name:
          <input
          type="text"
          name="Name"
          autocomplete="off"
          required>
        </label>

        <label for="" class="form-field">
          How old are You?
          <input
          type="number"
          id="age"
          name="age"
          value="12"
          min="12"
          max="100">
          <label for="age"></label>
        </label>

        <label for="" class="form-field">
          Full date of birth:
          <input
          type="date"
          name="date of birth"
          autocomplete="off"
          required>
        </label>

        <label for="" class="form-field-last">
          <label for="terms">
            I accept the term of the agreement
          </label>
          <input
          type="checkbox"
          name="accept-the-term"
          id="terms"
          required>
        </label>
      </fieldset class="fieldset">
      <!----------------------Area 2--------------------->
      <fieldset class="fieldset">
        <legend class="legend">Registration</legend>

        <label for="" class="form-field">
          E-mail:
          <input
          type="email"
          name="email"
          placeholder="email@example.com"
          autocomplete="off"
          required>
        </label>

        <label for="" class="form-field-last">
          Password:
          <input
          type="password"
          name="password"
          minlength="5"
          maxlength="15"
          autocomplete="off"
          required>
        </label>
      </fieldset>
      <!-----------------------Area 3---------------------->
      <fieldset class="fieldset">
        <legend class="legend">An interesting fact about you!</legend>

        <div class="form-field">
          Do you love cats?

          <label for="">
            <input
            type="radio"
            name="cats"
            value="yes">
            Yes
          </label>

          <label for="">
            <input
            type="radio"
            name="cats"
            value="no">
            No
          </label>
        </div>

        <div class="form-field">
          What is your favorite color?
          <input
          type="color"
          id="color"
          value="black">
          <label for="color"></label>
        </div>

        <div class="form-field">
          What time do you go to bed?
          <input
          type="time"
          id="start-sleep"
          name="start-sleep">
          <label for="start-sleep"></label>
        </div>

        <label for="" class="form-field">
          What are your favorite brand of cars?
          <select name="brand" multiple>
            <option value="BMW">BMW</option>
            <option value="Audi">Audi</option>
            <option value="Lada">Lada</option>
          </select>
        </label>

        <div class="form-field-last">
          How do you rate our work?
          <input
          type="range"
          id="rate"
          name="rate"
          value="0"
          min="0"
          max="10">
          <label for="rate"></label>
        </div>
      </fieldset>
      <!---------------------Area 4------------------------->
      <fieldset class="fieldset">
        <legend class="legend">Additional info:</legend>

        <label for="" class="form-field">
          Comments:
          <textarea name="comments">
          </textarea>
        </label>

        <label for="" class="form-field-last">
          Would you recommend us?
          <select name="recomend" >
            <option value="yes">yes</option>
            <option value="no">no</option>
          </select>
        </label>
      </fieldset>

      <button type="submit">Submit</button>

    </form>

    <script type="text/javascript" src="./main.js"></script>
  </body>
</html>
